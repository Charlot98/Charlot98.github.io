<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo2.png" type="image/png" />
  <title>排队屏幕1 - 工作端</title>
  <style>
    body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f4f6fb; color: #222; }
    .wrap { max-width: min(100vw - 24px, 1680px); margin: 0 auto; padding: 16px; box-sizing: border-box; }
    .card { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); margin-bottom: 12px; }
    /* 日期 + 按钮固定宽度，操作人员视图不占满整列 */
    .toolbar {
      display: grid;
      grid-template-columns: minmax(148px, 200px) 96px 96px 1fr;
      gap: 10px 12px;
      align-items: end;
    }
    .toolbar-spacer { min-width: 0; }
    .toolbar-op { justify-self: end; }
    .toolbar-op button {
      width: auto;
      min-width: 132px;
      max-width: 200px;
      padding-left: 14px;
      padding-right: 14px;
      white-space: nowrap;
    }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input, button { width: 100%; padding: 8px; border: 1px solid #d0d8e5; border-radius: 8px; box-sizing: border-box; font: inherit; }
    input[type="checkbox"],
    input[type="radio"] {
      width: auto;
      margin: 0;
      flex-shrink: 0;
      vertical-align: middle;
    }
    button { background: #2d6cdf; color: #fff; border: none; cursor: pointer; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; align-items: start; }
    /* 允许表格在窄栏内横向滚动，避免心超列表右侧列被“吃掉” */
    .grid > .card { min-width: 0; }
    .title { background: #4a90e2; color: #fff; border-radius: 8px; padding: 10px 12px; font-size: 17px; font-weight: 700; }
    .list { margin-top: 8px; border: 1px solid #e4ebf7; border-radius: 8px; max-height: 70vh; overflow: auto; -webkit-overflow-scrolling: touch; }
    .row {
      display: grid;
      grid-template-columns:
        46px
        58px
        minmax(100px, 1.25fr)
        36px
        minmax(72px, 88px)
        52px
        72px;
      gap: 6px 8px;
      padding: 8px 8px;
      border-bottom: 1px solid #eef2f8;
      align-items: center;
      font-size: 13px;
      position: relative;
      min-width: 600px;
    }
    .hold-dot {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f1c40f;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
    }
    .row > div { line-height: 1.35; }
    .row.head {
      position: sticky;
      top: 0;
      background: #eef4ff;
      font-weight: 700;
      z-index: 1;
      font-size: 13px;
      color: #334;
    }
    .badge { font-weight: 700; color: #d35400; }
    .status-nocall { color: #3498db; font-weight: 700; }
    .status-hold { color: #f1c40f; font-weight: 700; }
    .status-pass { color: #7f8c8d; font-weight: 700; cursor: pointer; }
    .status-completed { color: #27ae60; font-weight: 700; }
    .meta {
      font-size: 13px;
      color: #555;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 20px;
      row-gap: 12px;
    }
    .cell-name { word-break: break-word; }
    .cell-time { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .cell-wait { font-weight: 700; }
    .cell-center { text-align: center; }
    .speak-btn {
      border: 1px solid #2d6cdf;
      background: #f0f5ff;
      color: #2d6cdf;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .speak-btn:hover { background: #e3edff; }
    .service-tools {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      flex: 1 1 260px;
      min-width: min(100%, 260px);
      max-width: 100%;
      font-size: 13px;
      color: #445;
    }
    .service-tools label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
      cursor: pointer;
      line-height: 1.45;
      white-space: normal;
    }

    @media (max-width: 1200px) {
      .toolbar { grid-template-columns: minmax(140px, 1fr) 88px 88px 1fr; }
      .toolbar-op button { max-width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .row {
        grid-template-columns:
          42px
          52px
          minmax(88px, 1fr)
          32px
          minmax(68px, 80px)
          48px
          68px;
        font-size: 12px;
        min-width: 560px;
      }
    }
  </style>
  <script src="demo-static-api.js"></script>
  <script src="demo-shared-defaults.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div><label>日期</label><input id="date" type="date" /></div>
        <div><button id="loadBtn" type="button">加载</button></div>
        <div><button id="refreshBtn" type="button">手动刷新</button></div>
        <div class="toolbar-spacer toolbar-op"><button id="operatorViewBtn" type="button">操作人员视图</button></div>
      </div>
    </div>

    <div class="card meta">
      <div class="service-tools">
        <label><input type="checkbox" id="callServiceEnabled" checked /> 启用本机语音叫号</label>
        <span id="callServiceStatus">已启用</span>
      </div>
      <div>叫号结果：<span id="callResult">-</span></div>
      <div>待做总数：<span id="countAll">0</span></div>
      <div>腹部：<span id="countAbd">0</span></div>
      <div>心脏：<span id="countHeart">0</span></div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="title">腹超/其它（待做序号）</div>
        <div class="list" id="abdList"></div>
      </div>
      <div class="card">
        <div class="title">心超（待做序号）</div>
        <div class="list" id="heartList"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const FORCE_REFRESH_KEY = "queue_force_refresh_at";
    const DEFAULT_ROOM = params.get("room")
      || (typeof window.QUEUE_DEMO_DEFAULT_ROOM === "string" && String(window.QUEUE_DEMO_DEFAULT_ROOM).trim())
      || "15";
    const CALL_SERVICE_KEY = "queue_screen1_call_service_enabled";
    /** 演示：false = 关闭定时拉取 JSON/代理，仅手动点「刷新」、换日期或跨页 storage 触发 */
    const ENABLE_LIVE_POLLING = false;
    let customRows = [];
    let caseStateMap = new Map();
    function todayLocalISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    const QUEUE_SHARED_WORK_DATE_KEY = "queue_demo_shared_work_date";
    const QUEUE_WORK_DATE_BC = "queue_demo_work_date_v1";
    function isIsoDate(s) {
      return typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s);
    }
    function readSharedWorkDateSeed() {
      const u = params.get("date");
      if (isIsoDate(u)) return u;
      try {
        const def = typeof window.QUEUE_DEMO_DEFAULT_WORK_DATE === "string"
          ? String(window.QUEUE_DEMO_DEFAULT_WORK_DATE).trim()
          : "";
        if (isIsoDate(def)) return def;
      } catch {}
      try {
        const s = localStorage.getItem(QUEUE_SHARED_WORK_DATE_KEY);
        if (isIsoDate(s)) return s;
      } catch {}
      return todayLocalISO();
    }
    const workDateBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_WORK_DATE_BC)
      : null;
    const QUEUE_STATE_SYNC_BC = "queue_demo_state_sync_v1";
    const STATE_SYNC_TAB_ID = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const stateSyncBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_STATE_SYNC_BC)
      : null;
    let stateSyncNotifyTimer = null;
    let stateSyncPeerReloadTimer = null;
    /** 病例状态变更后通知操作人员页等同源标签（与 queue_screen1_operator / queue_screen2 共用频道） */
    function notifyQueueStateSync() {
      if (stateSyncNotifyTimer) clearTimeout(stateSyncNotifyTimer);
      stateSyncNotifyTimer = setTimeout(() => {
        stateSyncNotifyTimer = null;
        if (stateSyncBroadcast) {
          try {
            stateSyncBroadcast.postMessage({ ts: Date.now(), from: STATE_SYNC_TAB_ID });
          } catch {}
        } else {
          try {
            localStorage.setItem(FORCE_REFRESH_KEY, String(Date.now()));
          } catch {}
        }
      }, 120);
    }
    function persistSharedWorkDate(d) {
      if (!isIsoDate(d)) return;
      try {
        localStorage.setItem(QUEUE_SHARED_WORK_DATE_KEY, d);
      } catch {}
      try {
        if (workDateBroadcast) workDateBroadcast.postMessage({ date: d, ts: Date.now() });
      } catch {}
    }
    function syncDateQueryToUrl(dateStr) {
      const u = new URL(window.location.href);
      u.searchParams.set("date", dateStr);
      window.history.replaceState({}, "", u);
    }
    function getProxyBase() {
      const explicit = params.get("proxy");
      if (explicit) return explicit.replace(/\/call$/, "");
      return `${window.location.protocol}//${window.location.hostname}:18080`;
    }
    function isHeart(item) { return String(item.kind_group || item.kind || "").includes("心"); }
    function isPending(item) { return String(item.rh_status) !== "9"; }
    function stateText(s) {
      if (String(s) === "2") return "叫号未到";
      if (String(s) === "9") return "已完成";
      return "未叫号";
    }
    function normalizeStatus(item) {
      const st = caseStateMap.get(item.case_key) || {};
      const s = String(st.status || "").trim();
      if (s === "calling") return "pass";
      if (s === "nocall" || s === "hold" || s === "pass" || s === "completed") return s;
      if (String(item.rh_status) === "9") return "completed";
      // 无 case_states 覆盖时，不把 rh_status=2/3 当作「叫号未到」
      return "nocall";
    }
    function buildCaseKey(item) {
      const patientId = String(item?.patient_id || "").trim();
      if (patientId) return `pid:${patientId}`;
      const serialNo = String(item?.serial_no || "").trim();
      if (serialNo) return `sn:${serialNo}`;
      return `tmp:${item?.xh ?? ""}-${item?.name ?? ""}-${item?.pat_name ?? ""}`;
    }
    function getDisplayStatus(item) {
      const s = normalizeStatus(item);
      if (s === "pass") return "叫号未到";
      if (s === "hold") return "暂离留号";
      if (s === "completed") return "已完成";
      if (s === "nocall") return "未叫号";
      return stateText(item.rh_status);
    }
    function getStatusClass(item) {
      const s = normalizeStatus(item);
      if (s === "pass") return "status-pass";
      if (s === "hold") return "status-hold";
      if (s === "completed") return "status-completed";
      return "status-nocall";
    }
    function formatQueueNo(item) {
      const no = String(item?.xh ?? "").trim();
      if (!no) return "-";
      if (/^M\d+$/i.test(no)) return no.toUpperCase();
      return `${isHeart(item) ? "X" : "Y"}${no}`;
    }
    function waitHoursText(signtime) {
      if (!signtime) return "-";
      const parsed = new Date(String(signtime).replace(" ", "T"));
      if (Number.isNaN(parsed.getTime())) return "-";
      const diffMs = Date.now() - parsed.getTime();
      const diffHours = Math.max(0, diffMs / (1000 * 60 * 60));
      return `${diffHours.toFixed(1)}h`;
    }
    function speakCallAnnouncement(item) {
      if (!("speechSynthesis" in window)) return false;
      const no = item.xh ?? "-";
      const petName = (item.name || "").trim();
      const ownerName = (item.pat_name || "").trim();
      const namePart = petName && ownerName && ownerName !== "-"
        ? `，${petName}（宠主${ownerName}）`
        : petName
          ? `，${petName}`
          : "";
      const text = `请 ${no} 号${namePart}，到超声室检查。`;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "zh-CN";
      utter.rate = 0.95;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      return true;
    }

    async function callNumberViaProxy(item) {
      const resultEl = document.getElementById("callResult");
      const ttsOn = document.getElementById("callServiceEnabled").checked;
      const no = item.xh ?? "-";
      if (!ttsOn) {
        resultEl.textContent = `已关闭本机语音：${no}号（未播报）`;
        return;
      }
      const ok = speakCallAnnouncement(item);
      const tag = item.queue_bucket === "custom" ? "（自定义行）" : "";
      resultEl.textContent = ok
        ? `本机语音叫号${tag}：${no}号`
        : `本机语音不可用（浏览器不支持朗读）${tag}：${no}号`;
    }

    function renderList(el, rows) {
      const head = `<div class="row head"><div class="cell-center">排序</div><div class="cell-center">序号</div><div>宠物/宠主</div><div class="cell-center" title="双击行切换">剃毛</div><div class="cell-center">状态</div><div class="cell-center">等待</div><div class="cell-center">叫号</div></div>`;
      const body = rows.map((r, i) => `
        <div class="row" data-case-key="${r.case_key}">
          ${normalizeStatus(r) === "hold" ? '<span class="hold-dot" title="暂离留号"></span>' : ""}
          <div class="badge cell-center">${i + 1}</div>
          <div class="cell-center">${formatQueueNo(r)}</div>
          <div class="cell-name">${r.name || "-"} / ${r.pat_name || "-"}</div>
          <div class="cell-center shaved-cell">${(caseStateMap.get(r.case_key)?.is_shaved) ? "✓" : ""}</div>
          <div class="cell-center status-cell ${getStatusClass(r)}">${getDisplayStatus(r)}</div>
          <div class="cell-center cell-wait">${waitHoursText(r.signtime)}</div>
          <div class="cell-center"><button class="speak-btn" data-speak='${JSON.stringify({ xh: r.xh, serial_no: r.serial_no || "", patient_id: r.patient_id || "", callingroom: r.callingroom || "", name: r.name || "", pat_name: r.pat_name || "", kind: r.kind || r.kind_group || "", rh_status: r.rh_status || "", queue_bucket: r.queue_bucket || "" })}'>叫号</button></div>
        </div>
      `).join("");
      el.innerHTML = head + body;
      el.querySelectorAll(".speak-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const payload = JSON.parse(btn.dataset.speak || "{}");
          await callNumberViaProxy(payload);
        });
      });
      el.querySelectorAll(".row[data-case-key]").forEach(rowEl => {
        rowEl.addEventListener("dblclick", async () => {
          const caseKey = rowEl.dataset.caseKey;
          const date = document.getElementById("date").value.trim();
          const room = DEFAULT_ROOM;
          const current = caseStateMap.get(caseKey) || {};
          try {
            await upsertCaseState(date, room, caseKey, { is_shaved: !current.is_shaved });
            const shavedCell = rowEl.querySelector(".shaved-cell");
            if (shavedCell) shavedCell.textContent = (!current.is_shaved) ? "✓" : "";
          } catch (e) {
            alert(`更新剃毛状态失败：${e.message}`);
          }
        });
        const statusCell = rowEl.querySelector(".status-cell");
        statusCell?.addEventListener("click", async (e) => {
          e.stopPropagation();
          const caseKey = rowEl.dataset.caseKey;
          const date = document.getElementById("date").value.trim();
          const room = DEFAULT_ROOM;
          const current = caseStateMap.get(caseKey) || {};
          const nextStatus = current.status === "pass" ? "" : "pass";
          try {
            await upsertCaseState(date, room, caseKey, { status: nextStatus });
            await safeLoad();
          } catch (err) {
            alert(`更新状态失败：${err.message}`);
          }
        });
      });
    }

    function flatten(data) {
      const out = [];
      for (const g of (data || [])) {
        for (const k of ["listnocall", "listcalling", "listpass", "listcallover"]) {
          const normalizedBucket = (k === "listcalling" || k === "listpass") ? "listnocall" : k;
          for (const item of (g[k] || [])) out.push({ ...item, queue_bucket: normalizedBucket, kind_group: g.kind || "" });
        }
      }
      return out;
    }

    async function loadCustomRows(date, room, nonce = 0) {
      const proxyBase = getProxyBase();
      try {
        const resp = await fetch(
          `${proxyBase}/custom_rows?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}&t=${encodeURIComponent(String(nonce || Date.now()))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        customRows = resp.ok && data.ok && Array.isArray(data.rows) ? data.rows : [];
      } catch {
        customRows = [];
      }
    }
    async function loadCaseStates(date, room, nonce = 0) {
      const proxyBase = getProxyBase();
      try {
        const resp = await fetch(
          `${proxyBase}/case_states?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}&t=${encodeURIComponent(String(nonce || Date.now()))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        caseStateMap = new Map();
        if (resp.ok && data.ok && Array.isArray(data.rows)) {
          data.rows.forEach(r => caseStateMap.set(r.case_key, r));
        }
      } catch {
        caseStateMap = new Map();
      }
    }
    async function upsertCaseState(date, room, caseKey, patch) {
      const proxyBase = getProxyBase();
      const current = caseStateMap.get(caseKey) || {};
      const payload = {
        date,
        room,
        case_key: caseKey,
        is_shaved: patch.is_shaved ?? !!current.is_shaved,
        status: patch.status ?? current.status ?? ""
      };
      const resp = await fetch(`${proxyBase}/case_state`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      caseStateMap.set(caseKey, { ...current, ...payload });
      notifyQueueStateSync();
    }

    async function loadData() {
      const date = document.getElementById("date").value.trim();
      const room = DEFAULT_ROOM;
      const file = `../exports/RH_GET99LIST_${date}_room${room}.json`;
      const nonce = Date.now();
      const res = await fetch(`${file}?t=${nonce}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      await loadCustomRows(date, room, nonce);
      await loadCaseStates(date, room, nonce);
      const merged = flatten(json.data).concat(customRows).map(r => ({ ...r, case_key: r.case_key || buildCaseKey(r) }));
      const pending = merged
        .filter(r => normalizeStatus(r) !== "completed")
        .filter(r => ["listnocall", "custom"].includes(String(r.queue_bucket || "")))
        .sort((a,b) => Number(a.xh||0)-Number(b.xh||0));
      const heart = pending.filter(isHeart);
      const abd = pending.filter(x => !isHeart(x));
      renderList(document.getElementById("heartList"), heart);
      renderList(document.getElementById("abdList"), abd);
      document.getElementById("countAll").textContent = pending.length;
      document.getElementById("countHeart").textContent = heart.length;
      document.getElementById("countAbd").textContent = abd.length;
    }

    async function safeLoad() {
      try {
        const d = document.getElementById("date").value.trim();
        if (d) syncDateQueryToUrl(d);
        await loadData();
      } catch (e) { alert("加载失败: " + e.message); }
    }
    function scheduleReloadFromPeerSync() {
      if (stateSyncPeerReloadTimer) return;
      stateSyncPeerReloadTimer = setTimeout(() => {
        stateSyncPeerReloadTimer = null;
        safeLoad();
      }, 60);
    }
    function triggerGlobalRefresh() {
      try {
        localStorage.setItem(FORCE_REFRESH_KEY, String(Date.now()));
      } catch {}
    }
    function applyExternalWorkDate(d) {
      if (!isIsoDate(d)) return;
      const el = document.getElementById("date");
      if (!el || el.value.trim() === d) return;
      el.value = d;
      syncDateQueryToUrl(d);
      safeLoad();
    }
    const dateInput = document.getElementById("date");
    const dateSeed = readSharedWorkDateSeed();
    persistSharedWorkDate(dateSeed);
    dateInput.value = dateSeed;
    syncDateQueryToUrl(dateSeed);
    dateInput.addEventListener("click", () => {
      if (typeof dateInput.showPicker === "function") dateInput.showPicker();
    });
    const callServiceEnabled = localStorage.getItem(CALL_SERVICE_KEY);
    const enabled = callServiceEnabled === null ? true : callServiceEnabled === "1";
    document.getElementById("callServiceEnabled").checked = enabled;
    document.getElementById("callServiceStatus").textContent = enabled ? "本机语音：开" : "本机语音：关";
    document.getElementById("callServiceEnabled").addEventListener("change", (e) => {
      const on = !!e.target.checked;
      localStorage.setItem(CALL_SERVICE_KEY, on ? "1" : "0");
      document.getElementById("callServiceStatus").textContent = on ? "本机语音：开" : "本机语音：关";
    });
    document.getElementById("loadBtn").addEventListener("click", safeLoad);
    document.getElementById("refreshBtn").addEventListener("click", () => {
      triggerGlobalRefresh();
      safeLoad();
    });
    dateInput.addEventListener("change", () => {
      const d = dateInput.value.trim();
      if (isIsoDate(d)) persistSharedWorkDate(d);
      safeLoad();
    });
    window.addEventListener("storage", (e) => {
      if (e.key === QUEUE_SHARED_WORK_DATE_KEY && e.newValue && isIsoDate(e.newValue)) {
        applyExternalWorkDate(e.newValue);
        return;
      }
      if (e.key !== FORCE_REFRESH_KEY) return;
      safeLoad();
    });
    if (workDateBroadcast) {
      workDateBroadcast.onmessage = (ev) => {
        const d = ev.data && ev.data.date;
        if (isIsoDate(d)) applyExternalWorkDate(d);
      };
    }
    if (stateSyncBroadcast) {
      stateSyncBroadcast.onmessage = (ev) => {
        const from = ev.data && ev.data.from;
        if (from === STATE_SYNC_TAB_ID) return;
        scheduleReloadFromPeerSync();
      };
    }
    document.getElementById("operatorViewBtn").addEventListener("click", () => {
      const date = document.getElementById("date").value.trim();
      const room = DEFAULT_ROOM;
      const url = `queue_screen1_operator.html?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}`;
      window.open(url, "_blank");
