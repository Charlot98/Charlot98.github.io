<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>不同等级医生每日病例量曲线</title>
  <script>
    (function () {
      var KEY = 'dash_auth_token';
      // 刷新本页时，强制回到登录
      try {
        var nav = performance.getEntriesByType && performance.getEntriesByType('navigation')[0];
        var isReload = nav ? nav.type === 'reload' : (performance.navigation && performance.navigation.type === 1);
        if (isReload) {
          try { localStorage.removeItem(KEY); } catch (e) {}
          window.location.replace('login.html');
          return;
        }
      } catch (e) {}
      // 未登录则跳转登录页
      try {
        if (localStorage.getItem(KEY) !== 'logged_in') {
          window.location.replace('login.html');
        }
      } catch (e) {
        window.location.replace('login.html');
      }
    })();
  </script>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <style>
    .nav-top a { text-decoration: none; color: #6b7280; transition: color 0.15s ease; }
    .nav-top a:hover { color: #374151; }
  </style>
</head>
<body>
  <div class="nav-top" style="padding: 8px 16px 0; font-size: 14px;">
    <a href="dashboard.html">首页</a> 
    <a href="cases_lines.html">折线图</a> 
    <a href="cases_scatter.html">散点图</a>
    <a href="doctors.html">测试</a> 
  </div>

  <div style="margin: 4px 0 6px; display: flex; justify-content: center; align-items: center; font-size: 18px; position: relative;">
    <div style="font-weight: 600; text-align: center;">
      不同等级医生每日人均病例量（仅上午+下午）
    </div>
    <div style="font-size: 16px; position: absolute; right: 40px;">
      <span style="margin-right: 4px;">开始月份：</span>
      <select id="start-month" style="font-size: 15px; padding: 2px 6px;"></select>
      <span style="margin: 0 4px 0 12px;">结束月份：</span>
      <select id="end-month" style="font-size: 15px; padding: 2px 6px;"></select>
    </div>
  </div>

  <div id="container-levels" style="width: 100%; height: 600px; margin-top: 16px;"></div>
  <div id="container-level-fee" style="width: 100%; height: 600px; margin-top: 40px;"></div>

  <script>
    // 读取本地 CSV
    function loadCSV(path, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', path, true);
      xhr.onload = function () {
        if (xhr.status === 200 || xhr.status === 0) {
          callback(xhr.responseText);
        } else {
          alert('加载 CSV 失败: ' + xhr.status);
        }
      };
      xhr.send();
    }

    loadCSV('05不同等级医生工作量.csv', function (csv) {
      var lines = csv.trim().split('\n');
      if (lines.length <= 1) {
        alert('05不同等级医生工作量.csv 内容为空或只有表头');
        return;
      }

      // 表头
      var header = lines[0].split(',').map(function (h) { return h.trim(); });
      var idxDate    = header.indexOf('日期');
      var idxLevel   = header.indexOf('医生等级');
      var idxCount   = header.indexOf('每日病例量');
      var idxFee     = header.indexOf('每日总费用');
      var idxRatio   = header.indexOf('每日费用病例比');
      var idxCntLv   = header.indexOf('该等级医生数量');
      var idxWorkday = header.indexOf('工作日/周末');

      if (idxDate === -1 || idxLevel === -1 || idxCount === -1) {
        alert('CSV 表头中缺少 必要列：日期 / 医生等级 / 每日病例量');
        return;
      }

      // 按等级分组的数据：{ '预备': [], '初级': [], ... }
      var seriesMap = {};
      // 全院每日平均病例数（次数）汇总用：按日期聚合
      var overallDaily = {}; // key: 日期字符串, value: { x, sumCases, sumDocs }

      for (var i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        var cols = lines[i].split(',');

        var dateStr = cols[idxDate];
        var level   = cols[idxLevel] || '';
        var count   = parseFloat(cols[idxCount] || '0');
        var fee     = idxFee   >= 0 ? parseFloat(cols[idxFee]   || '0') : 0;
        var ratio   = idxRatio >= 0 ? parseFloat(cols[idxRatio] || '0') : 0;
        var lvlCnt  = idxCntLv >= 0 ? parseInt(cols[idxCntLv]   || '0', 10) : 0;
        var wdFlag  = idxWorkday >= 0 ? (cols[idxWorkday] || '') : '';

        if (!dateStr || !level) continue;

        var parts = dateStr.split('-');
        if (parts.length < 3) continue;
        var year  = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10) - 1; // JS 月份从 0 开始
        var day   = parseInt(parts[2], 10);
        if (isNaN(year) || isNaN(month) || isNaN(day)) continue;
        var xVal = Date.UTC(year, month, day);

        if (!seriesMap[level]) {
          seriesMap[level] = [];
        }
        seriesMap[level].push({
          x: xVal,
          y: count,       // 纵坐标：每日病例量（人均）
          level: level,
          fee: fee,       // 每日总费用（人均）
          ratio: ratio,   // 每日费用病例比
          levelCount: lvlCnt,
          workFlag: wdFlag
        });

        // 汇总全院：总病例数、总费用、医生数（用于「全部」折线）
        var dateKey = dateStr;
        if (!overallDaily[dateKey]) {
          overallDaily[dateKey] = { x: xVal, sumCases: 0, sumDocs: 0, sumFees: 0 };
        }
        overallDaily[dateKey].sumCases += count * lvlCnt;
        overallDaily[dateKey].sumDocs  += lvlCnt;
        overallDaily[dateKey].sumFees  += fee * lvlCnt;
      }

      // 构造「全部」医生等级的每日平均病例数、每日人均总费用
      var overallSeries = [];
      Object.keys(overallDaily).sort().forEach(function (k) {
        var o = overallDaily[k];
        var avg = o.sumDocs ? (o.sumCases / o.sumDocs) : 0;
        var avgFee = o.sumDocs ? (o.sumFees / o.sumDocs) : 0;
        overallSeries.push({
          x: o.x,
          y: avg,
          level: '全部',
          fee: avgFee,
          ratio: avgFee / (avg || 1),
          levelCount: o.sumDocs,
          workFlag: ''
        });
      });
      if (overallSeries.length) {
        seriesMap['全部'] = overallSeries;
      }

      // 计算每个点所属的月份键，并收集所有月份（YYYY-MM）
      var monthSet = {};
      Object.keys(seriesMap).forEach(function (lvl) {
        seriesMap[lvl].forEach(function (p) {
          var d = new Date(p.x);
          var key =
            d.getUTCFullYear() +
            '-' +
            ('0' + (d.getUTCMonth() + 1)).slice(-2);
          p._monthKey = key;
          monthSet[key] = true;
        });
      });

      var months = Object.keys(monthSet).sort();

      // 填充开始 / 结束月份下拉框
      var startSel = document.getElementById('start-month');
      var endSel = document.getElementById('end-month');
      months.forEach(function (m) {
        var opt1 = document.createElement('option');
        opt1.value = m;
        opt1.textContent = m;
        startSel.appendChild(opt1);
        var opt2 = document.createElement('option');
        opt2.value = m;
        opt2.textContent = m;
        endSel.appendChild(opt2);
      });
      if (months.length) {
        startSel.value = months[0];
        endSel.value = months[months.length - 1];
      }

      // 构造 series 数组，并按照日期排序每条线，且按 等级顺序：预备、初级、中级、高级
      var order = ['预备', '初级', '中级', '高级'];

      function buildSeriesFromMap(map) {
        var result = [];
        // 先按指定顺序推入
        order.forEach(function (lvl) {
          if (!map[lvl]) return;
          var dataArr = map[lvl];
          dataArr.sort(function (a, b) { return a.x - b.x; });
          result.push({
            name: lvl,
            data: dataArr
          });
        });
        // 再把其余可能存在的等级（如果有）追加在后面
        Object.keys(map).forEach(function (lvl) {
          if (order.indexOf(lvl) !== -1) return;
          var dataArr = map[lvl];
          dataArr.sort(function (a, b) { return a.x - b.x; });
          result.push({
            name: lvl,
            data: dataArr
          });
        });
        return result;
      }

      // 根据选择的开始 / 结束月份过滤数据
      function filterMapByRange(map, startMonth, endMonth) {
        var out = {};
        Object.keys(map).forEach(function (lvl) {
          var pts = map[lvl].filter(function (p) {
            var key = p._monthKey;
            return key >= startMonth && key <= endMonth;
          });
          if (pts.length) out[lvl] = pts;
        });
        return out;
      }

      function renderCharts() {
        if (!months.length) return;
        var startMonth = startSel.value;
        var endMonth = endSel.value;
        if (startMonth > endMonth) {
          var tmp = startMonth;
          startMonth = endMonth;
          endMonth = tmp;
        }

        // 判断是否同一月份，用于控制坐标显示粒度
        var sameMonthRange = (startMonth === endMonth);

        var filteredMap = filterMapByRange(seriesMap, startMonth, endMonth);

        var series = buildSeriesFromMap(filteredMap);
        // 将“全部”这一条改为折线，其余仍为点状图
        var seriesForCounts = series.map(function (s) {
          if (s.name === '全部') {
            return Object.assign({}, s, {
              type: 'line',
              marker: { enabled: false }
            });
          }
          return s;
        });

        // 第二个图的 map（费用）
        var feeMap = {};
        Object.keys(filteredMap).forEach(function (lvl) {
          feeMap[lvl] = filteredMap[lvl].map(function (p) {
            return {
              x: p.x,
              y: p.fee,
              level: p.level,
              ratio: p.ratio,
              levelCount: p.levelCount,
              workFlag: p.workFlag
            };
          });
        });
        var feeSeries = buildSeriesFromMap(feeMap);
        // 第二个图：“全部”改为折线，其余仍为点状图
        var feeSeriesForChart = feeSeries.map(function (s) {
          if (s.name === '全部') {
            return Object.assign({}, s, {
              type: 'line',
              marker: { enabled: false }
            });
          }
          return s;
        });

        Highcharts.chart('container-levels', {
          chart: {
            type: 'scatter',
            zoomType: 'x'
          },
          title: {
            text: null
          },
          xAxis: {
            type: 'datetime',
            title: { text: null },
            // 单月：显示具体日期，间隔 10 天；多月：只显示月份，间隔约 1 个月
            tickInterval: sameMonthRange ? 24 * 3600 * 1000 * 10 : 30 * 24 * 3600 * 1000,
            labels: {
              formatter: function () {
                if (sameMonthRange) {
                  return Highcharts.dateFormat('%Y-%m-%d', this.value);
                }
                return Highcharts.dateFormat('%Y-%m', this.value);
              }
            }
          },
          yAxis: {
            title: { text: '平均病例数' },
            min: 0,
            allowDecimals: false
          },
          legend: {
            layout: 'horizontal',
            align: 'center',
            verticalAlign: 'top'
          },
          credits: {
            enabled: false
          },
          tooltip: {
            useHTML: true,
            headerFormat: '',
            pointFormatter: function () {
              return (
                '日期：<b>' + Highcharts.dateFormat('%Y-%m-%d', this.x) + '</b><br/>' +
                '医生等级：' + this.level + '<br/>' +
                '每日人均病例量：<b>' + this.y + '</b><br/>' +
                '每日总费用（人均）：' + this.fee.toFixed(2) + '<br/>' +
                '每日费用病例比：' + this.ratio.toFixed(2) + '<br/>' +
                '该等级医生数量：' + this.levelCount + '<br/>' +
                '工作日/周末：' + (this.workFlag || '')
              );
            }
          },
          plotOptions: {
            scatter: {
              marker: {
                enabled: true,
                radius: 3,
                symbol: 'circle'
              }
            },
            series: {
              turboThreshold: 0
            }
          },
          series: seriesForCounts
        });

        Highcharts.chart('container-level-fee', {
          chart: {
            type: 'scatter',
            zoomType: 'x'
          },
          title: {
            text: '不同等级医生每日人均总费用（仅上午+下午）'
          },
          xAxis: {
            type: 'datetime',
            title: { text: null },
            tickInterval: sameMonthRange ? 24 * 3600 * 1000 * 10 : 30 * 24 * 3600 * 1000,
            labels: {
              formatter: function () {
                if (sameMonthRange) {
                  return Highcharts.dateFormat('%Y-%m-%d', this.value);
                }
                return Highcharts.dateFormat('%Y-%m', this.value);
              }
            }
          },
          yAxis: {
            title: { text: '每日人均总费用' },
            min: 0
          },
          legend: {
            layout: 'horizontal',
            align: 'center',
            verticalAlign: 'top'
          },
          credits: {
            enabled: false
          },
          tooltip: {
            useHTML: true,
            headerFormat: '',
            pointFormatter: function () {
              return (
                '日期：<b>' + Highcharts.dateFormat('%Y-%m-%d', this.x) + '</b><br/>' +
                '医生等级：' + this.level + '<br/>' +
                '每日人均总费用：<b>' + this.y.toFixed(2) + '</b><br/>' +
                '每日费用病例比：' + this.ratio.toFixed(2) + '<br/>' +
                '该等级医生数量：' + this.levelCount + '<br/>' +
                '工作日/周末：' + (this.workFlag || '')
              );
            }
          },
          plotOptions: {
            scatter: {
              marker: {
                enabled: true,
                radius: 3,
                symbol: 'circle'
              }
            },
            series: {
              turboThreshold: 0
            }
          },
          series: feeSeriesForChart
        });
      }

      // 初次渲染
      renderCharts();

      // 选择变化时重新渲染
      startSel.addEventListener('change', renderCharts);
      endSel.addEventListener('change', renderCharts);
    });
  </script>
</body>
</html>
