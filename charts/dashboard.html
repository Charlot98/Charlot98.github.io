<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>统计看板</title>
    <script>
      (function () {
        var KEY = 'dash_auth_token';
        // 未登录则跳转登录页
        try {
          if (localStorage.getItem(KEY) !== 'logged_in') {
            window.location.replace('login.html');
          }
        } catch (e) {
          window.location.replace('login.html');
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        background: #fafaf7;
        font-family: "宋体", "SimSun", STSong, "SF Pro Text", -apple-system,
          BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .dash-root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .dash-logout {
        position: fixed;
        top: 16px;
        right: 20px;
        font-size: 13px;
      }
      .dash-logout button {
        padding: 4px 12px;
        border-radius: 999px;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        cursor: pointer;
      }
      .dash-logout button:hover {
        background: #e5e7eb;
      }
      /* 标题更大、更醒目 */
      .dash-title {
        font-size: 32px;        /* 原 26 */
        letter-spacing: 6px;
        margin-bottom: 48px;
      }
      /* 菜单整体字体放大 */
      .dash-menu {
        font-size: 22px;        /* 原 18 */
        line-height: 2.6;
        display: inline-block;
        text-align: left;
      }
      /* 左右两列统一使用宋体，左对齐 */
      .nav-label {
        display: inline-block;
        width: 160px;           /* 略加宽，列更整齐 */
        text-align: left;
        margin-right: 48px;
        font-family: "宋体", "SimSun", STSong, serif;
      }
      .nav-text {
        display: inline-block;
        text-align: left;
        font-family: "宋体", "SimSun", STSong, serif;
      }
      .nav-row {
        display: block;
        padding: 4px 0;
        margin: 6px 0;
      }
      .nav-link {
        text-decoration: none;
        color: #111827;
        padding: 0 4px;
        border-radius: 0;
        transition: background-color 0.15s ease, color 0.15s ease;
      }
      .nav-link:hover {
        background-color: rgba(0, 114, 199, 0.93);
      }
    </style>
  </head>
  <body>
    <div class="dash-logout">
      <button id="logout-btn">退出</button>
    </div>
    <div class="dash-root">
      <div style="text-align: center; margin-bottom: 40px;">
        <div class="dash-title">统计看板</div>
        <div class="dash-menu">
          <div class="nav-row">
            <span class="nav-label">工作量</span>
            <a href="cases_lines.html" class="nav-link nav-text">分级（折线图）</a>
          </div>
          <div class="nav-row">
            <span class="nav-label">工作量</span>
            <a href="cases_scatter.html" class="nav-link nav-text">分级（散点图）</a>
          </div>
          <div class="nav-row">
            <span class="nav-label">工作量</span>
            <a href="doctors.html" class="nav-link nav-text">个人（测试）</a>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var KEY = 'dash_auth_token';
        var btn = document.getElementById('logout-btn');
        if (btn) {
          btn.addEventListener('click', function () {
            try {
              localStorage.removeItem(KEY);
            } catch (e) {}
            window.location.replace('login.html');
          });
        }
      })();
    </script>
  </body>
</html>
