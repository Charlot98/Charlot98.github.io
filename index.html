<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vet Vault</title>
    <link rel="icon" type="image/x-icon" href="/my_docs/favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --surface: rgba(15, 23, 42, 0.72);
        --surface-hover: rgba(30, 41, 59, 0.85);
        --line: rgba(148, 163, 184, 0.12);
        --line-strong: rgba(148, 163, 184, 0.22);
        --text-main: #f1f5f9;
        --text-sub: #94a3b8;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.12);
        --accent-glow: rgba(56, 189, 248, 0.35);
        --brand: #22d3ee;
        --brand-hover: #06b6d4;
        --radius: 14px;
        --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text-main);
      }

      body {
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56, 189, 248, 0.14), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.08), transparent),
          radial-gradient(ellipse 50% 30% at 0% 80%, rgba(45, 212, 191, 0.06), transparent);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        height: 56px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        background: rgba(7, 11, 20, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .brand {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text-main);
      }

      .nav-links {
        display: flex;
        gap: 8px;
      }

      .nav-links a {
        color: var(--text-sub);
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 8px;
        transition: color 0.2s, background 0.2s;
      }

      .nav-links a:hover {
        color: var(--text-main);
        background: var(--accent-soft);
      }

      .main {
        min-height: calc(100vh - 56px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 48px 28px 64px;
      }

      .panel {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        padding: 28px 24px 24px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .panel-header {
        text-align: center;
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }

      .title {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .desc {
        margin: 0;
        color: var(--text-sub);
        font-size: 14px;
        line-height: 1.5;
      }

      .links {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
        flex: 1;
      }

      .links a {
        display: block;
        text-decoration: none;
        color: #042f2e;
        background: var(--brand);
        border: 1px solid transparent;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-align: center;
        transition: background 0.2s ease;
      }

      .links a:hover {
        background: var(--brand-hover);
      }

      .links a:focus-visible {
        outline: 2px solid var(--brand-hover);
        outline-offset: 2px;
      }

      @media (max-width: 480px) {
        .main {
          padding: 32px 16px 48px;
          gap: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Charlot98</div>
      <nav class="nav-links">
        <a href="vetvault_changelog/">更新日志</a>
        <a href="https://app.paperpile.com/" target="_blank" rel="noopener noreferrer">文献库</a>
      </nav>
    </header>
    <main class="main">
      <section class="panel">
        <div class="panel-header">
          <h1 class="title">Vet Vault</h1>
          <p class="desc">请选择你要进入的功能页面</p>
        </div>
        <ul class="links">
          <li><a href="echocardiography">心超报告生成器</a></li>
          <li><a href="my_docs">知识库（暂停更新）</a></li>
          <li><a href="charts/">统计看板</a></li>
          <li><a href="dentalchart/">牙表</a></li>
          <li><a href="audioreports/">语音报告助手（v1.1.0）</a></li>
        </ul>
      </section>

      <section class="panel panel--download">
        <div class="panel-header">
          <h1 class="title">工具下载</h1>
          <p class="desc">点击链接进入下载界面</p>
        </div>
        <ul class="links">
          <li><a href="https://wwbbx.lanzouw.com/iWwUZ3pjalaj" target="_blank" rel="noopener noreferrer">合图</a></li>
          <li><a href="https://wwbbx.lanzouw.com/i6eY93qfza4j" target="_blank" rel="noopener noreferrer">autostart</a></li>
          <li><a href="https://wwbbx.lanzouw.com/ipoK93qg50wd" target="_blank" rel="noopener noreferrer">合图20260417微调</a></li>
          <li><a href="https://wwbbx.lanzouw.com/iXE1Y3rmva0j" target="_blank" rel="noopener noreferrer">合图202600611</a></li>
          <li><a href="https://wwbbx.lanzouw.com/iCmb33rmw7tg" target="_blank" rel="noopener noreferrer">合图202600611_new</a></li>
          <li><a href="https://wwbbx.lanzouw.com/iDvFV3rnpugf" target="_blank" rel="noopener noreferrer">合图202600611_测试</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
