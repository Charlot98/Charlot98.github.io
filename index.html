<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vet Vault</title>
    <link rel="icon" type="image/x-icon" href="/my_docs/favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --bg-elev: #0b1222;
        --line: #1f2937;
        --text-main: #e5e7eb;
        --text-sub: #9ca3af;
        --brand: #22d3ee;
        --brand-hover: #06b6d4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text-main);
      }

      .topbar {
        height: 56px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: rgba(2, 6, 23, 0.9);
      }

      .brand {
        font-size: 15px;
        font-weight: 600;
        color: #f3f4f6;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        color: var(--text-sub);
        text-decoration: none;
        font-size: 14px;
      }

      .nav-links a:hover {
        color: var(--text-main);
      }

      .main {
        min-height: calc(100vh - 56px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .panel {
        width: 100%;
        max-width: 560px;
        text-align: center;
      }

      .title {
        margin: 0 0 10px;
        font-size: 44px;
        line-height: 1.15;
        font-weight: 700;
      }

      .desc {
        margin: 0 0 26px;
        color: var(--text-sub);
        font-size: 16px;
      }

      .links {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      .links a {
        display: block;
        text-decoration: none;
        color: #042f2e;
        background: var(--brand);
        border: 1px solid transparent;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
        transition: background 0.2s ease;
      }

      .links a:hover {
        background: var(--brand-hover);
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">影像知识库</div>
      <nav class="nav-links">
        <a href="vetvault_changelog/">更新日志</a>
        <a href="https://app.paperpile.com/" target="_blank" rel="noopener noreferrer">文献库</a>
      </nav>
    </header>
    <main class="main">
      <section class="panel">
        <h1 class="title">Vet Vault</h1>
        <p class="desc">请选择你要进入的功能页面</p>
        <ul class="links">
        <li><a href="echocardiography_dev">心超报告生成器</a></li>
        <li><a href="vetvault_changelog/">更新日志</a></li>
        <li><a href="my_docs">知识库</a></li>
        <li><a href="charts/">统计看板</a></li>
        <li><a href="dentalchart/dental_chart_pub.html">牙表</a></li>
        <li><a href="queue_demo/screen1.html">排队操作人员demo</a></li>
        <li><a href="queue_demo/screen2.html">排队对外显示demo</a></li>
        <li><a href="https://wwbbx.lanzouw.com/b0fqbk9qd" target="_blank" rel="noopener noreferrer">合图</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
