<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="左心室应变 17 节段牛眼图">
  <defs>
    <style>
      .lv-strain-seg { fill: transparent; cursor: pointer; stroke: none; transition: fill 0.15s ease; }
      .lv-strain-seg:hover { fill: rgba(0,0,0,0.05); }
      .lv-strain-seg.lv-strain-seg--red { fill: #e53935; }
      .lv-strain-seg.lv-strain-seg--red:hover { fill: #ef5350; }
      .lv-strain-overlay { pointer-events: none; }
      .lv-strain-grid { stroke: #666; stroke-width: 1; fill: none; }
      .lv-strain-border { stroke: #777; stroke-width: 3.5; fill: none; }
      .lv-strain-wall-band { fill: #e3e0e0; stroke: none; pointer-events: none; }
      .lv-strain-label { fill: #444; font-size: 9px; font-family: system-ui, -apple-system, sans-serif; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .lv-strain-seg-no,
      .lv-strain-seg-value { font-size: 8px; font-family: system-ui, -apple-system, sans-serif; font-weight: 700; text-anchor: middle; dominant-baseline: middle; pointer-events: none; fill: #333; stroke: #fff; stroke-width: 2px; paint-order: stroke; }
      .lv-strain-seg-no--on-red,
      .lv-strain-seg-value.lv-strain-seg-no--on-red { fill: #fff; stroke: #e53935; stroke-width: 2px; paint-order: stroke; }
      .lv-strain-seg-value { font-size: 9px; }
    </style>
  </defs>
