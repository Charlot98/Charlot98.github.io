<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo2.png" type="image/png" />
  <title>排队屏幕2 - 展示端</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #eaf2ff;
    }
    *, *::before, *::after { box-sizing: border-box; }
    .wrap {
      padding: clamp(8px, 2vw, 16px);
      position: relative;
      z-index: 1;
      max-width: 100%;
    }
    /* 顶栏随页面粘性置顶，实底避免滚动时与下方正文叠字 */
    .screen-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px 20px;
      padding: 4px 0 12px;
      margin: 0 0 8px;
      background: #0f172a;
      box-shadow: 0 12px 20px -8px rgba(15, 23, 42, 0.95);
    }
    .logo-watermark {
      position: fixed;
      bottom: 12px;
      right: 16px;
      width: min(22vw, 260px);
      height: auto;
      opacity: 1;
      z-index: 20;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .title {
      font-size: clamp(1.25rem, 5vw, 1.9rem);
      font-weight: 700;
      line-height: 1.15;
      flex: 0 1 auto;
      min-width: 0;
    }
    .meta {
      position: static;
      flex: 0 1 auto;
      max-width: min(100%, 48vw);
      min-width: 0;
      font-size: clamp(12px, 2.8vw, 14px);
      color: #9fb3d9;
      text-align: right;
      line-height: 1.4;
      overflow-wrap: anywhere;
      word-break: break-word;
      pointer-events: none;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      width: 100%;
    }
    .panel {
      background: #111d36;
      border: 1px solid #28406d;
      border-radius: 10px;
      padding: clamp(8px, 2vw, 12px);
      min-height: min(82vh, 900px);
      min-width: 0;
      max-width: 100%;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: clamp(1.05rem, 3.8vw, 1.5rem);
      color: #9ed1ff;
    }
    .row {
      display: grid;
      grid-template-columns:
        clamp(36px, 11vw, 80px)
        clamp(44px, 13vw, 120px)
        minmax(0, 1.3fr)
        clamp(38px, 10vw, 90px)
        minmax(0, 1.45fr);
      gap: clamp(4px, 1.5vw, 8px);
      padding: clamp(6px, 1.5vw, 10px) clamp(4px, 1.5vw, 8px);
      border-bottom: 1px solid #22365e;
      align-items: center;
      width: 100%;
    }
    .row > div {
      min-width: 0;
    }
    .row.head { background: #1a2d52; border-radius: 8px; font-weight: 700; position: sticky; top: 0; z-index: 1; }
    .rank {
      font-size: clamp(0.95rem, 4.2vw, 1.4rem);
      color: #ffd166;
      font-weight: 700;
    }
    .num {
      font-size: clamp(1rem, 4.5vw, 1.5rem);
      color: #ff6b6b;
      font-weight: 700;
    }
    .owner-pet {
      font-size: clamp(0.85rem, 3.2vw, 1.35rem);
      font-weight: 700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .status-nocall { color: #3498db; font-size: clamp(0.8rem, 2.8vw, 1.1rem); }
    .status-waitshave { color: #3498db; font-size: clamp(0.8rem, 2.8vw, 1.1rem); font-weight: 400; }
    .status-soon { color: #f1c40f; font-weight: 700; font-size: clamp(0.8rem, 2.8vw, 1.1rem); }
    .status-hold { color: #f1c40f; font-size: clamp(0.8rem, 2.8vw, 1.1rem); }
    .status-pass { color: #7f8c8d; font-size: clamp(0.8rem, 2.8vw, 1.1rem); }
    .status-completed { color: #27ae60; font-size: clamp(0.8rem, 2.8vw, 1.1rem); }
    @media (max-width: 900px) {
      .screen-header { flex-direction: column; align-items: stretch; }
      .meta { max-width: 100%; text-align: left; font-size: 13px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .panel { min-height: auto; }
      .row.head { font-size: clamp(11px, 2.8vw, 13px); }
    }
    @media (max-width: 420px) {
      .row {
        grid-template-columns: 32px 40px minmax(0, 1.2fr) 30px minmax(0, 1.35fr);
        gap: 3px 4px;
        padding: 6px 4px;
      }
    }
    /* 默认隐藏视口右侧滚动条，滚动/滚轮时短暂显示 */
    html {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    html.scrollbar-active {
      scrollbar-width: thin;
    }
    html.scrollbar-active::-webkit-scrollbar {
      width: 10px;
    }
    html.scrollbar-active::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }
    html.scrollbar-active::-webkit-scrollbar-thumb {
      background: rgba(159, 179, 217, 0.4);
      border-radius: 999px;
    }
  </style>
  <script src="demo-static-api.js"></script>
  <script src="demo-shared-defaults.js"></script>
</head>
<body>
  <img class="logo-watermark" src="logo1.png" alt="logo" />
    <div class="wrap">
      <div class="screen-header">
        <div class="title">超声待做检查显示</div>
        <div class="meta" id="meta">加载中...</div>
      </div>
      <div class="grid">
      <div class="panel">
        <h2>腹超/其它</h2>
        <div id="abd"></div>
      </div>
      <div class="panel">
        <h2>心超</h2>
        <div id="heart"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const FORCE_REFRESH_KEY = "queue_force_refresh_at";
    /** 与操作人员页一致：true = 定时拉取队列 JSON + 高频同步 case_states；同页签内另有 Broadcast 即时推送 */
    const ENABLE_LIVE_POLLING = true;
    function todayLocalISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    const QUEUE_SHARED_WORK_DATE_KEY = "queue_demo_shared_work_date";
    const QUEUE_WORK_DATE_BC = "queue_demo_work_date_v1";
    /** 操作人员页写入 case_state / display_settings 后广播，展示端立即轻量刷新 */
    const QUEUE_STATE_SYNC_BC = "queue_demo_state_sync_v1";
    function isIsoDate(s) {
      return typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s);
    }
    function readSharedWorkDateSeed() {
      const u = params.get("date");
      if (isIsoDate(u)) return u;
      try {
        const def = typeof window.QUEUE_DEMO_DEFAULT_WORK_DATE === "string"
          ? String(window.QUEUE_DEMO_DEFAULT_WORK_DATE).trim()
          : "";
        if (isIsoDate(def)) return def;
      } catch {}
      try {
        const s = localStorage.getItem(QUEUE_SHARED_WORK_DATE_KEY);
        if (isIsoDate(s)) return s;
      } catch {}
      return todayLocalISO();
    }
    const workDateBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_WORK_DATE_BC)
      : null;
    const stateSyncBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_STATE_SYNC_BC)
      : null;
    function persistSharedWorkDate(d) {
      if (!isIsoDate(d)) return;
      try {
        localStorage.setItem(QUEUE_SHARED_WORK_DATE_KEY, d);
      } catch {}
      try {
        if (workDateBroadcast) workDateBroadcast.postMessage({ date: d, ts: Date.now() });
      } catch {}
    }
    function syncWorkDateToUrl(d) {
      if (!isIsoDate(d)) return;
      const u = new URL(window.location.href);
      u.searchParams.set("date", d);
      window.history.replaceState({}, "", u);
    }
    const ROOM = params.get("room")
      || (typeof window.QUEUE_DEMO_DEFAULT_ROOM === "string" && String(window.QUEUE_DEMO_DEFAULT_ROOM).trim())
      || "15";
    let workDateCache = readSharedWorkDateSeed();
    persistSharedWorkDate(workDateCache);
    syncWorkDateToUrl(workDateCache);
    let latestMergedRows = [];
    function getWorkDate() {
      return workDateCache;
    }
    function applyExternalWorkDate(d) {
      if (!isIsoDate(d) || workDateCache === d) return;
      workDateCache = d;
      syncWorkDateToUrl(d);
      latestMergedRows = [];
      safeLoad();
    }
    let displaySettings = { abd_soon_limit: 3, heart_soon_limit: 2 };
    const PROJECT_NAME_MAP = {
      "超声心脏（检查）": "心超",
      "超声检查（消化系统）": "消化",
      "超声检查（胃肠道）": "胃肠",
      "超声检查（腹腔筛查套餐）": "腹腔筛查",
      "超声检查（泌尿系统）": "泌尿",
      "超声检查（生殖系统）": "生殖",
      "超声检查（腹腔检查套餐）": "腹腔检查",
      "超声检查（单腔其他）": "单腔",
      "超声检查（全腹扫查套餐）": "全腹",
      "超声检查（胸膜腔肿物扫查）": "胸膜腔肿物",
      "超声检查（颈部肿物）": "颈部肿物",
      "急诊超声T-FAST": "T-FAST",
      "急诊超声A-FAST": "A-FAST",
      "超声排查腹膜腔积液": "排查腹膜腔积液",
      "超声心脏（检查+左心高阶测量）": "心超+左心",
      "超声心脏（检查+左右心高阶测量）": "心超+左右心",
      "超声心脏（检查+右心高阶测量）": "心超+右心",
      "超声检查（双眼）": "双眼",
      "超声造影（肝脏）": "超声造影(肝脏)",
      "超声造影（心脏）": "超声造影(心脏)",
      "超声造影（胆囊）": "超声造影(胆囊)",
      "超声造影（胰腺）": "超声造影(胰腺)",
      "超声造影": "超声造影",
      "超声检查（体表肿物扫查）": "体表肿物",
      "超声引导排空（胸腔液）": "排空(胸腔液)",
      "超声引导排空（腹腔液）": "排空(腹腔液)",
      "超声引导排空（尿液）": "排空(尿液)",
      "超声引导排空（心包积液）": "排空(心包液)",
      "超声介入（前列腺囊肿）": "介入(前列腺囊肿)",
      "超声介入（胆囊）": "介入(胆囊)",
      "超声介入（sub维护）": "sub维护",
      "超声介入活检取样tru-cut": "tru-cut",
      "超声介入瘤内注射": "瘤内注射",
      "超声介入（其他）": "介入(其他)"
    };
    function isHeart(item) { return String(item.kind_group || item.kind || "").includes("心"); }
    function buildCaseKey(item) {
      const patientId = String(item?.patient_id || "").trim();
      if (patientId) return `pid:${patientId}`;
      const serialNo = String(item?.serial_no || "").trim();
      if (serialNo) return `sn:${serialNo}`;
      return `tmp:${item?.xh ?? ""}-${item?.name ?? ""}-${item?.pat_name ?? ""}`;
    }
    function formatQueueNo(item) {
      const no = String(item?.xh ?? "").trim();
      if (!no) return "-";
      if (/^M\d+$/i.test(no)) return no.toUpperCase();
      return `${isHeart(item) ? "X" : "Y"}${no}`;
    }
    function isPending(item) { return String(item.rh_status) !== "9"; }
    function getSignTimeMs(item) {
      const t = new Date(String(item?.signtime || "").replace(" ", "T")).getTime();
      return Number.isNaN(t) ? Number.POSITIVE_INFINITY : t;
    }
    function sortBySignTime(rows) {
      return rows.slice().sort((a, b) => {
        const ta = getSignTimeMs(a);
        const tb = getSignTimeMs(b);
        if (ta !== tb) return ta - tb;
        return Number(a.xh || 0) - Number(b.xh || 0);
      });
    }
    function stateText(s) {
      if (String(s) === "2") return "叫号未到";
      if (String(s) === "9") return "已完成";
      return "未叫号";
    }
    function simplifyProjectName(raw) {
      const text = String(raw || "").trim();
      if (!text) return "";
      if (PROJECT_NAME_MAP[text]) return PROJECT_NAME_MAP[text];
      const normalized = text
        .replace(/\s+/g, "")
        .replace(/\(/g, "（")
        .replace(/\)/g, "）");
      if (PROJECT_NAME_MAP[normalized]) return PROJECT_NAME_MAP[normalized];

      let s = text
        .replace(/（[^）]*）/g, "")
        .replace(/\([^)]*\)/g, "")
        .replace(/超声检查/g, "")
        .replace(/超声/g, "")
        .trim();

      s = s.replace(/^[、,\s]+|[、,\s]+$/g, "");
      return s || text;
    }
    function simplifyProjectList(itemName) {
      const list = String(itemName || "")
        .split(/[，,、；;]/)
        .map(x => simplifyProjectName(x))
        .filter(Boolean)
        .filter((v, i, arr) => arr.indexOf(v) === i);
      return list.join("、");
    }
    function normalizeStatus(item, caseStateMap) {
      const st = caseStateMap.get(item.case_key) || {};
      const s = String(st.status || "").trim();
      if (s === "calling") return "pass";
      if (s === "nocall" || s === "hold" || s === "pass" || s === "completed") return s;
      if (String(item.rh_status) === "9") return "completed";
      // 无 case_states 覆盖时，不把 rh_status=2/3 当作「叫号未到」
      return "nocall";
    }
    function getSoonCaseKeySet(rows, caseStateMap, limit) {
      const nocallRows = rows
        .filter(r => normalizeStatus(r, caseStateMap) === "nocall")
        .filter(r => !!(caseStateMap.get(r.case_key)?.is_shaved))
        .slice(0, Math.max(0, Number(limit) || 0));
      return new Set(nocallRows.map(r => r.case_key));
    }
    function clampSoonLimit(v, fallbackValue) {
      const n = Number(v);
      if (!Number.isFinite(n)) return fallbackValue;
      return Math.max(0, Math.min(30, Math.floor(n)));
    }
    function getDisplayStatus(item, caseStateMap, soonCaseKeySet) {
      const isShaved = !!(caseStateMap.get(item.case_key)?.is_shaved);
      if (!isShaved) return "等待剃毛";
      if (soonCaseKeySet && soonCaseKeySet.has(item.case_key) && normalizeStatus(item, caseStateMap) === "nocall") {
        return "即将检查，门口等待";
      }
      const s = normalizeStatus(item, caseStateMap);
      if (s === "pass") return "叫号未到";
      if (s === "hold") return "暂离留号";
      if (s === "completed") return "已完成";
      if (s === "nocall") return "未叫号";
      return stateText(item.rh_status);
    }
    function getStatusClass(item, caseStateMap, soonCaseKeySet) {
      const isShaved = !!(caseStateMap.get(item.case_key)?.is_shaved);
      if (!isShaved) return "status-waitshave";
      if (soonCaseKeySet && soonCaseKeySet.has(item.case_key) && normalizeStatus(item, caseStateMap) === "nocall") {
        return "status-soon";
      }
      const s = normalizeStatus(item, caseStateMap);
      if (s === "pass") return "status-pass";
      if (s === "hold") return "status-hold";
      if (s === "completed") return "status-completed";
      return "status-nocall";
    }

    function flatten(data) {
      const out = [];
      for (const g of (data || [])) {
        for (const k of ["listnocall", "listcalling", "listpass", "listcallover"]) {
          const normalizedBucket = (k === "listcalling" || k === "listpass") ? "listnocall" : k;
          for (const item of (g[k] || [])) out.push({ ...item, queue_bucket: normalizedBucket, kind_group: g.kind || "" });
        }
      }
      return out;
    }

    function render(el, rows, caseStateMap, soonLimit) {
      const soonCaseKeySet = getSoonCaseKeySet(rows, caseStateMap, soonLimit);
      const head = `<div class="row head"><div>排序</div><div>序号</div><div>宠物 / 宠主</div><div>剃毛</div><div>状态</div></div>`;
      const body = rows.map((r, i) => `
        <div class="row">
          <div class="rank">${i + 1}</div>
          <div class="num">${formatQueueNo(r)}</div>
          <div class="owner-pet">${r.name || "-"} / ${r.pat_name || "-"}</div>
          <div>${caseStateMap.get(r.case_key)?.is_shaved ? "✓" : ""}</div>
          <div class="${getStatusClass(r, caseStateMap, soonCaseKeySet)}">${getDisplayStatus(r, caseStateMap, soonCaseKeySet)}</div>
        </div>
      `).join("");
      el.innerHTML = head + body;
    }

    async function fetchCustomRows() {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      const nonce = Date.now();
      try {
        const resp = await fetch(
          `${proxyBase}/custom_rows?date=${encodeURIComponent(getWorkDate())}&room=${encodeURIComponent(ROOM)}&t=${encodeURIComponent(String(nonce))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        if (!resp.ok || !data.ok || !Array.isArray(data.rows)) return [];
        return data.rows;
      } catch {
        return [];
      }
    }
    async function fetchCaseStates() {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      const nonce = Date.now();
      try {
        const resp = await fetch(
          `${proxyBase}/case_states?date=${encodeURIComponent(getWorkDate())}&room=${encodeURIComponent(ROOM)}&t=${encodeURIComponent(String(nonce))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        const map = new Map();
        if (resp.ok && data.ok && Array.isArray(data.rows)) {
          data.rows.forEach(r => map.set(r.case_key, r));
        }
        return map;
      } catch {
        return new Map();
      }
    }
    async function fetchDisplaySettings() {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      try {
        const resp = await fetch(`${proxyBase}/display_settings?date=${encodeURIComponent(getWorkDate())}&room=${encodeURIComponent(ROOM)}`);
        const data = await resp.json();
        if (!resp.ok || !data.ok) return;
        displaySettings = {
          abd_soon_limit: clampSoonLimit(data.abd_soon_limit, 3),
          heart_soon_limit: clampSoonLimit(data.heart_soon_limit, 2),
        };
      } catch {}
    }

    async function load() {
      const file = `../exports/RH_GET99LIST_${getWorkDate()}_room${ROOM}.json`;
      const res = await fetch(`${file}?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const sourceRows = flatten(json.data);
      const customRows = await fetchCustomRows();
      await fetchDisplaySettings();
      const caseStateMap = await fetchCaseStates();
      latestMergedRows = sourceRows.concat(customRows).map(r => ({ ...r, case_key: r.case_key || buildCaseKey(r) }));
      const pending = latestMergedRows
        .filter(r => normalizeStatus(r, caseStateMap) !== "completed")
        .filter(r => ["listnocall", "custom"].includes(String(r.queue_bucket || "")))
      ;
      const heart = sortBySignTime(pending.filter(isHeart));
      const abd = sortBySignTime(pending.filter(x => !isHeart(x)));
      render(document.getElementById("heart"), heart, caseStateMap, displaySettings.heart_soon_limit);
      render(document.getElementById("abd"), abd, caseStateMap, displaySettings.abd_soon_limit);
      document.getElementById("meta").textContent =
        `业务日期 ${getWorkDate()} | 腹超 ${abd.length} 条 | 心超 ${heart.length} 条 | 即将检查(腹${displaySettings.abd_soon_limit}/心${displaySettings.heart_soon_limit}) | 刷新: ${new Date().toLocaleString("zh-CN")}`;
    }

    async function syncCaseStatesOnly() {
      if (!latestMergedRows.length) return;
      await fetchDisplaySettings();
      const caseStateMap = await fetchCaseStates();
      const pending = latestMergedRows
        .filter(r => normalizeStatus(r, caseStateMap) !== "completed")
        .filter(r => ["listnocall", "custom"].includes(String(r.queue_bucket || "")))
      ;
      const heart = sortBySignTime(pending.filter(isHeart));
      const abd = sortBySignTime(pending.filter(x => !isHeart(x)));
      render(document.getElementById("heart"), heart, caseStateMap, displaySettings.heart_soon_limit);
      render(document.getElementById("abd"), abd, caseStateMap, displaySettings.abd_soon_limit);
      document.getElementById("meta").textContent =
        `业务日期 ${getWorkDate()} | 腹超 ${abd.length} 条 | 心超 ${heart.length} 条 | 即将检查(腹${displaySettings.abd_soon_limit}/心${displaySettings.heart_soon_limit}) | 刷新: ${new Date().toLocaleString("zh-CN")}`;
    }

    async function safeLoad() {
      try { await load(); }
      catch (e) { document.getElementById("meta").textContent = "加载失败: " + e.message; }
    }
    window.addEventListener("storage", (e) => {
      if (e.key === QUEUE_SHARED_WORK_DATE_KEY && e.newValue && isIsoDate(e.newValue)) {
        applyExternalWorkDate(e.newValue);
        return;
      }
      if (e.key !== FORCE_REFRESH_KEY) return;
      safeLoad();
    });
    if (workDateBroadcast) {
      workDateBroadcast.onmessage = (ev) => {
        const d = ev.data && ev.data.date;
        if (isIsoDate(d)) applyExternalWorkDate(d);
      };
    }
    if (stateSyncBroadcast) {
      stateSyncBroadcast.onmessage = () => {
        syncCaseStatesOnly().catch(() => {});
      };
    }
    if (ENABLE_LIVE_POLLING) {
      setInterval(safeLoad, 3000);
      setInterval(() => { syncCaseStatesOnly().catch(() => {}); }, 1000);
    }
    safeLoad();
  </script>
  <script>
    (function () {
      const root = document.documentElement;
      let hideTimer = null;
      const HIDE_AFTER_MS = 900;
      function activateScrollbar() {
        root.classList.add("scrollbar-active");
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          root.classList.remove("scrollbar-active");
          hideTimer = null;
        }, HIDE_AFTER_MS);
      }
      window.addEventListener("scroll", activateScrollbar, { passive: true });
      window.addEventListener("wheel", activateScrollbar, { passive: true });
    })();
  </script>
</body>
