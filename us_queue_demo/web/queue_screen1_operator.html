<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo2.png" type="image/png" />
  <title>操作人员显示页</title>
  <style>
    body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f4f6fb; color: #223; }
    .wrap { padding: 12px; padding-top: 72px; }
    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid transparent;
      border-radius: 0;
      padding: 8px 12px;
      margin-bottom: 0;
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 100;
    }
    label { font-size: 11px; color: #5a6780; display: block; margin-bottom: 2px; }
    input, button { width: 100%; box-sizing: border-box; padding: 6px 8px; border-radius: 8px; border: 1px solid #d0d8e5; font: inherit; }
    button { background: #2d6cdf; color: #fff; border: none; cursor: pointer; }
    .meta { font-size: 12px; color: #556; text-align: right; white-space: nowrap; margin-left: auto; }
    .date-block {
      display: grid;
      grid-template-columns: 1fr;
      align-items: end;
      min-width: 132px;
      max-width: 152px;
    }
    .date-block input { font-size: 13px; padding: 6px 10px; }
    .search-block {
      display: grid;
      grid-template-columns: 1fr;
      align-items: end;
      min-width: 260px;
      max-width: 320px;
      width: 28vw;
    }
    .search-block input {
      font-size: 13px;
      padding: 6px 10px;
    }
    .soon-controls {
      display: grid;
      grid-template-columns: 120px 80px 120px 80px 110px;
      gap: 6px;
      align-items: end;
      justify-content: start;
    }
    .soon-controls label { margin-bottom: 1px; font-size: 11px; }
    .soon-controls input { text-align: center; font-size: 22px; font-weight: 700; line-height: 1.1; padding-top: 4px; padding-bottom: 4px; }
    .soon-controls .save-btn { padding: 6px 10px; border-radius: 8px; font-size: 14px; font-weight: 700; }
    .room-block { display: none; }
    .board {
      background: #fff;
      border: 1px solid #e4ebf7;
      border-radius: 10px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      grid-auto-rows: 120px;
      gap: 8px;
      min-height: calc(120px * 5 + 8px * 4);
    }
    .card {
      border: 1px solid #d8e2f3;
      border-radius: 10px;
      background: #f9fbff;
      padding: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }
    .card::before {
      content: attr(data-slot-index);
      position: absolute;
      left: 8px;
      bottom: 4px;
      transform: none;
      font-size: 18px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.10);
      line-height: 1;
      pointer-events: none;
      z-index: 0;
    }
    .card > * { position: relative; z-index: 1; }
    .card.empty { background: #fbfcff; border-style: dashed; }
    .card.search-hit,
    .card.shaved.search-hit,
    .card.status-border-first-abd.search-hit,
    .card.status-border-first-heart.search-hit {
      background: #d6e7ff !important;
      border-color: #2d6cdf !important;
      box-shadow: inset 0 0 0 2px rgba(45, 108, 223, 0.45) !important;
    }
    .card.shaved {
      border-color: #27ae60;
      background: #f3fff7;
      box-shadow: inset 0 0 0 1px rgba(39, 174, 96, .25);
    }
    .card.status-border-first-abd {
      border-width: 3px;
      border-color: #3498db;
      box-shadow: inset 0 0 0 1px rgba(52, 152, 219, .24);
    }
    .card.status-border-first-heart {
      border-width: 3px;
      border-color: #e74c3c;
      box-shadow: inset 0 0 0 1px rgba(231, 76, 60, .24);
    }
    .card.dragging { opacity: .7; transform: scale(0.98); }
    /* 长按改状态：卡片上按住超过 LONG_PRESS_ARM_MS 后出现圆环（叫号按钮除外），描边转满即激活 */
    .longpress-ring-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    .longpress-ring-wrap.visible { opacity: 1; }
    .longpress-ring-svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.08));
    }
    .longpress-ring-progress {
      stroke-dasharray: var(--lp-circ, 113.1);
      stroke-dashoffset: var(--lp-circ, 113.1);
    }
    .longpress-ring-progress.is-running {
      animation: longpress-ring-fill var(--lp-dur, 520ms) linear forwards;
    }
    @keyframes longpress-ring-fill {
      to { stroke-dashoffset: 0; }
    }
    .check-mark {
      position: absolute;
      right: 6px;
      top: 4px;
      font-size: 20px;
      font-weight: 700;
      color: #27ae60;
      line-height: 1;
    }
    .hold-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f1c40f;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
      z-index: 2;
    }
    .pass-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7f8c8d;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
      z-index: 2;
    }
    .line1 {
      font-size: 15px;
      font-weight: 700;
      color: #1d3557;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      padding-right: 24px;
    }
    .line3 {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
      color: #3a6ea5;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }
    .line4 { margin-top: 6px; font-size: 13px; color: #445; }
    .card-call-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: auto;
      min-width: 44px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid #2d6cdf;
      background: #f0f5ff;
      color: #2d6cdf;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 6px;
      z-index: 3;
      line-height: 20px;
    }
    .card-call-btn:hover { background: #e3edff; }
    .s1 { color: #f39c12; }
    .s2 { color: #3498db; }
    .s9 { color: #27ae60; }
    .lane-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.32);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    .lane-modal {
      width: min(440px, calc(100vw - 28px));
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e6edf9;
      box-shadow: 0 14px 34px rgba(18, 35, 66, 0.22);
      padding: 16px 16px 12px;
    }
    .lane-title {
      font-size: 22px;
      font-weight: 800;
      color: #22395d;
      margin-bottom: 14px;
      letter-spacing: 0.3px;
      text-align: center;
    }
    .lane-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .lane-actions button {
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      font-size: 34px;
      font-weight: 800;
      transition: transform .08s ease, box-shadow .12s ease, filter .12s ease;
    }
    .lane-actions button:active { transform: translateY(1px) scale(0.99); }
    .lane-actions .heart-btn {
      background: linear-gradient(180deg, #3f80f0 0%, #2d6cdf 100%);
      color: #fff;
      border: none;
      box-shadow: 0 6px 14px rgba(45, 108, 223, 0.28);
    }
    .lane-actions .heart-btn:hover { filter: brightness(1.03); }
    .lane-actions .abd-btn {
      background: linear-gradient(180deg, #38c172 0%, #27ae60 100%);
      color: #fff;
      border: none;
      box-shadow: 0 6px 14px rgba(39, 174, 96, 0.28);
    }
    .lane-actions .abd-btn:hover { filter: brightness(1.03); }
    .lane-cancel {
      margin-top: 10px;
      width: 100%;
      background: #f5f7fc;
      color: #4a566f;
      border: 1px solid #dbe3f2;
      border-radius: 12px;
      font-size: 30px;
      font-weight: 700;
      padding: 10px;
      cursor: pointer;
    }
    .lane-cancel:hover { background: #edf2fb; }
    .status-mask {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 320;
    }
    .status-mask.open {
      display: block;
    }
    .status-mask.open::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
    }
    .status-modal {
      position: fixed;
      width: 120px;
      z-index: 321;
      background: transparent;
      border-radius: 14px;
      border: 1px solid transparent;
      box-shadow: none;
      padding: 4px;
    }
    .status-modal::before {
      content: "";
      position: absolute;
      left: 24px;
      top: -8px;
      width: 14px;
      height: 14px;
      transform: rotate(45deg);
      background: transparent;
      border-left: 1px solid transparent;
      border-top: 1px solid transparent;
      z-index: 320;
    }
    .status-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .status-actions button {
      width: 100%;
      border-radius: 8px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      border: none;
      color: #fff;
      transition: transform .08s ease, filter .12s ease;
      white-space: nowrap;
    }
    .status-actions button:active { transform: translateY(1px) scale(0.99); }
    .status-nocall-btn { background: #3498db; }
    .status-hold-btn { background: #f1c40f; color: #223; }
    .status-pass-btn { background: #7f8c8d; }
    .status-completed-btn { background: #27ae60; }
    .status-actions button:hover { filter: brightness(1.04); }
  </style>
  <script src="demo-static-api.js"></script>
  <script src="demo-shared-defaults.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="room-block">
        <label>房间号</label>
        <input id="room" />
      </div>
      <div class="date-block">
        <label>业务日期</label>
        <input id="workDate" type="date" />
      </div>
      <div class="search-block">
        <label>检索（宠物 / 宠主 / 排队号）</label>
        <input id="quickSearchInput" placeholder="Y52/王*/rainny" />
      </div>
      <div class="soon-controls">
        <div><label>腹超/其它即将叫号</label></div>
        <div><input id="abdSoonLimitInput" type="number" min="0" max="30" value="3" /></div>
        <div><label>心超即将叫号</label></div>
        <div><input id="heartSoonLimitInput" type="number" min="0" max="30" value="2" /></div>
        <div><button id="saveSoonLimitBtn" class="save-btn">保存阈值</button></div>
      </div>
      <div class="meta" id="meta">加载中...</div>
    </div>
    <div class="board" id="board"></div>
  </div>
  <div class="lane-mask" id="laneMask">
    <div class="lane-modal">
      <div class="lane-title">该病例包含多项检查，请选择检查项目</div>
      <div class="lane-actions">
        <button class="heart-btn" id="deleteHeartBtn">心超</button>
        <button class="abd-btn" id="deleteAbdBtn">腹超</button>
      </div>
      <button class="lane-cancel" id="deleteLaneCancelBtn">取消</button>
    </div>
  </div>
  <div class="status-mask" id="statusMask">
    <div class="status-modal">
      <div class="status-actions">
        <button class="status-nocall-btn" id="setStatusNocallBtn">未叫号</button>
        <button class="status-hold-btn" id="setStatusHoldBtn">暂离留号</button>
        <button class="status-pass-btn" id="setStatusPassBtn">叫号未到</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const FORCE_REFRESH_KEY = "queue_force_refresh_at";
    const STATE_SYNC_TAB_ID = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    /** 演示：false = 关闭定时拉取与高频率状态同步 */
    const ENABLE_LIVE_POLLING = false;
    const stateText = { "1": "未叫号", "2": "叫号未到", "9": "已完成" };
    let caseStateMap = new Map();
    let latestRowsCache = [];
    let lastRenderSignature = "";
    let displaySettings = { abd_soon_limit: 3, heart_soon_limit: 2 };
    let silentSyncBusy = false;
    let silentSyncPending = false;
    let quickSearchKeyword = "";
    function todayLocalISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    const QUEUE_SHARED_WORK_DATE_KEY = "queue_demo_shared_work_date";
    const QUEUE_WORK_DATE_BC = "queue_demo_work_date_v1";
    function isIsoDate(s) {
      return typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s);
    }
    function readSharedWorkDateSeed() {
      const u = params.get("date");
      if (isIsoDate(u)) return u;
      try {
        const def = typeof window.QUEUE_DEMO_DEFAULT_WORK_DATE === "string"
          ? String(window.QUEUE_DEMO_DEFAULT_WORK_DATE).trim()
          : "";
        if (isIsoDate(def)) return def;
      } catch {}
      try {
        const s = localStorage.getItem(QUEUE_SHARED_WORK_DATE_KEY);
        if (isIsoDate(s)) return s;
      } catch {}
      return todayLocalISO();
    }
    const workDateBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_WORK_DATE_BC)
      : null;
    const QUEUE_STATE_SYNC_BC = "queue_demo_state_sync_v1";
    const stateSyncBroadcast = typeof BroadcastChannel !== "undefined"
      ? new BroadcastChannel(QUEUE_STATE_SYNC_BC)
      : null;
    let stateSyncNotifyTimer = null;
    let stateSyncPeerTimer = null;
    /** 通知 queue_screen1 / queue_screen2 等同源页轻量拉取 case_states / display_settings（去抖；无 BC 时用 storage） */
    function notifyDisplayScreensStateSync() {
      if (stateSyncNotifyTimer) clearTimeout(stateSyncNotifyTimer);
      stateSyncNotifyTimer = setTimeout(() => {
        stateSyncNotifyTimer = null;
        if (stateSyncBroadcast) {
          try {
            stateSyncBroadcast.postMessage({ ts: Date.now(), from: STATE_SYNC_TAB_ID });
          } catch {}
        } else {
          try {
            localStorage.setItem(FORCE_REFRESH_KEY, String(Date.now()));
          } catch {}
        }
      }, 120);
    }
    function persistSharedWorkDate(d) {
      if (!isIsoDate(d)) return;
      try {
        localStorage.setItem(QUEUE_SHARED_WORK_DATE_KEY, d);
      } catch {}
      try {
        if (workDateBroadcast) workDateBroadcast.postMessage({ date: d, ts: Date.now() });
      } catch {}
    }
    function getWorkDate() {
      const el = document.getElementById("workDate");
      const v = el && el.value.trim();
      if (v) return v;
      return params.get("date") || todayLocalISO();
    }
    function syncDateQueryToUrl(dateStr) {
      const u = new URL(window.location.href);
      u.searchParams.set("date", dateStr);
      window.history.replaceState({}, "", u);
    }
    function isHeart(item) { return String(item.kind_group || item.kind || "").includes("心"); }
    function isPending(item) { return String(item.rh_status) !== "9"; }
    function formatQueueNo(item) {
      const no = String(item?.xh ?? "").trim();
      if (!no) return "-";
      if (/^M\d+$/i.test(no)) return no.toUpperCase();
      return `${isHeart(item) ? "X" : "Y"}${no}`;
    }
    function waitHoursText(signtime) {
      if (!signtime) return "-";
      const parsed = new Date(String(signtime).replace(" ", "T"));
      if (Number.isNaN(parsed.getTime())) return "-";
      const diffMs = Date.now() - parsed.getTime();
      const diffHours = Math.max(0, diffMs / (1000 * 60 * 60));
      return `${diffHours.toFixed(1)}h`;
    }
    function getSignTimeMs(item) {
      const t = new Date(String(item?.signtime || "").replace(" ", "T")).getTime();
      return Number.isNaN(t) ? Number.POSITIVE_INFINITY : t;
    }
    function getProxyBase() {
      return `${window.location.protocol}//${window.location.hostname}:18080`;
    }
    function flatten99(rawData) {
      const out = [];
      for (const group of rawData || []) {
        const kindGroup = group.kind || "";
        for (const bucket of ["listnocall", "listcalling", "listpass", "listcallover"]) {
          const normalizedBucket = (bucket === "listcalling" || bucket === "listpass") ? "listnocall" : bucket;
          for (const item of (group[bucket] || [])) {
            out.push({ ...item, queue_bucket: normalizedBucket, kind_group: kindGroup });
          }
        }
      }
      return out;
    }

    function fullProjectList(itemName) {
      return String(itemName || "")
        .split(/[，,、；;]/)
        .map(x => String(x || "").trim())
        .filter(Boolean)
        .filter((v, i, arr) => arr.indexOf(v) === i)
        .join("、") || "未命名项目";
    }

    function getCaseKey(item) {
      const pid = String(item?.patient_id || "").trim();
      if (pid) return `pid:${pid}`;
      const sn = String(item?.serial_no || "").trim();
      if (sn) return `sn:${sn}`;
      return `tmp:${item?.xh ?? ""}-${item?.name ?? ""}-${item?.pat_name ?? ""}`;
    }
    function getLaneCaseKey(baseCaseKey, lane) {
      return `${baseCaseKey}::${lane}`;
    }
    function isRowCompleted(item) {
      const base = getCaseKey(item);
      const lane = isHeart(item) ? "heart" : "abd";
      const laneState = caseStateMap.get(getLaneCaseKey(base, lane)) || {};
      const baseState = caseStateMap.get(base) || {};
      return laneState.status === "completed" || baseState.status === "completed";
    }

    async function fetchCaseStates(date, room, nonce = 0) {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      try {
        const resp = await fetch(
          `${proxyBase}/case_states?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}&t=${encodeURIComponent(String(nonce || Date.now()))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        caseStateMap = new Map();
        if (resp.ok && data.ok && Array.isArray(data.rows)) data.rows.forEach(r => caseStateMap.set(r.case_key, r));
      } catch {
        caseStateMap = new Map();
      }
    }

    function buildPendingRows(rows) {
      return rows
        .filter(r => !isRowCompleted(r))
        .filter(r => getEffectiveStatusForFilter(r) !== "completed")
        .filter(r => ["listnocall", "custom"].includes(String(r.queue_bucket || "")))
        .sort((a, b) => {
          const ta = getSignTimeMs(a);
          const tb = getSignTimeMs(b);
          if (ta !== tb) return ta - tb;
          return Number(a.xh || 0) - Number(b.xh || 0);
        });
    }

    function normalizeStatusValue(rawStatus, rhStatus) {
      const s = String(rawStatus || "").trim();
      if (s === "calling") return "pass";
      if (s === "nocall" || s === "hold" || s === "pass" || s === "completed") return s;
      if (String(rhStatus) === "9") return "completed";
      // 无网页端显式状态时，不按 rh_status=2/3 推断为「叫号未到」，与 exports 默认展示一致。
      return "nocall";
    }

    function normalizeStatusForSoon(item) {
      // 与 queue_screen2 保持一致：即将叫号仅看基础 case_key 的状态映射。
      const base = getCaseKey(item);
      const st = caseStateMap.get(base) || {};
      return normalizeStatusValue(st.status, item.rh_status);
    }

    function getEffectiveStatusForFilter(item) {
      const base = getCaseKey(item);
      const lane = isHeart(item) ? "heart" : "abd";
      const laneState = caseStateMap.get(getLaneCaseKey(base, lane)) || {};
      const baseState = caseStateMap.get(base) || {};
      const laneRaw = String(laneState.status || "").trim();
      const baseRaw = String(baseState.status || "").trim();
      // 显式状态优先，避免 exports 刷新覆盖网页端已设状态。
      if (laneRaw) return normalizeStatusValue(laneRaw, item.rh_status);
      if (baseRaw) return normalizeStatusValue(baseRaw, item.rh_status);
      return normalizeStatusValue("", item.rh_status);
    }

    function buildSoonCaseKeyList(rows, lane, limit) {
      const targetRows = rows
        .filter(r => (lane === "heart" ? isHeart(r) : !isHeart(r)))
        .filter(r => normalizeStatusForSoon(r) === "nocall")
        .filter(r => !!(caseStateMap.get(getCaseKey(r))?.is_shaved))
        .slice(0, Math.max(0, Number(limit) || 0));
      const out = [];
      const seen = new Set();
      targetRows.forEach((r) => {
        const key = getCaseKey(r);
        if (!seen.has(key)) {
          seen.add(key);
          out.push(key);
        }
      });
      return out;
    }

    function buildRenderSignature(rows) {
      const merged = mergeRowsByCase(rows);
      const soonHeartList = buildSoonCaseKeyList(rows, "heart", displaySettings.heart_soon_limit);
      const soonAbdList = buildSoonCaseKeyList(rows, "abd", displaySettings.abd_soon_limit);
      const firstHeartKey = soonHeartList[0] || "";
      const firstAbdKey = soonAbdList[0] || "";
      const ids = merged.map(r => {
        const key = r.caseKey;
        const st = caseStateMap.get(key) || {};
        const mode = getCardBorderMode(r, firstHeartKey, firstAbdKey);
        return `${key}:${st.status || ""}:${st.is_shaved ? 1 : 0}:${isCardHold(r) ? 1 : 0}:${isCardPass(r) ? 1 : 0}:${mode}`;
      });
      return `${displaySettings.abd_soon_limit}|${displaySettings.heart_soon_limit}|${ids.join("|")}`;
    }

    async function upsertCaseState(date, room, caseKey, patch) {
      const proxyBase = getProxyBase();
      const current = caseStateMap.get(caseKey) || {};
      const payload = {
        date,
        room,
        case_key: caseKey,
        is_shaved: patch.is_shaved ?? !!current.is_shaved,
        status: patch.status ?? current.status ?? "",
        start_check_time: patch.start_check_time ?? current.start_check_time ?? ""
      };
      const resp = await fetch(`${proxyBase}/case_state`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      caseStateMap.set(caseKey, { ...current, ...payload });
      notifyDisplayScreensStateSync();
    }

    function hasExplicitStatusForBase(baseKey) {
      const base = String((caseStateMap.get(baseKey) || {}).status || "").trim();
      const heart = String((caseStateMap.get(getLaneCaseKey(baseKey, "heart")) || {}).status || "").trim();
      const abd = String((caseStateMap.get(getLaneCaseKey(baseKey, "abd")) || {}).status || "").trim();
      return !!(base || heart || abd);
    }

    /** 本机语音叫号（Web Speech API），返回是否已发起朗读 */
    function speakCallAnnouncement(item) {
      if (!("speechSynthesis" in window)) return false;
      const no = item?.xh ?? "-";
      const petName = String(item?.name || "").trim();
      const ownerName = String(item?.pat_name || "").trim();
      const namePart = petName && ownerName && ownerName !== "-"
        ? `，${petName}（宠主${ownerName}）`
        : petName
          ? `，${petName}`
          : "";
      const text = `请 ${no} 号${namePart}，到超声室检查。`;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "zh-CN";
      utter.rate = 0.95;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      return true;
    }

    async function callNumberViaProxy(payload) {
      const no = payload?.xh ?? "-";
      const ok = speakCallAnnouncement(payload);
      document.getElementById("meta").textContent = ok
        ? `本机语音叫号：${no}号`
        : `本机语音不可用（浏览器不支持朗读）：${no}号`;
    }

    function mergeRowsByCase(rows) {
      const groups = new Map();
      rows.forEach((item) => {
        const key = getCaseKey(item);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });

      const merged = [];
      for (const items of groups.values()) {
        const queueNos = items
          .slice()
          .sort((a, b) => {
            const pa = isHeart(a) ? 0 : 1;
            const pb = isHeart(b) ? 0 : 1;
            if (pa !== pb) return pa - pb;
            return Number(a.xh || 0) - Number(b.xh || 0);
          })
          .map(formatQueueNo);
        const projects = [...new Set(
          items
            .flatMap(i => String(i.item_name || "").split(/[，,、；;]/))
            .map(p => String(p || "").trim())
            .filter(Boolean)
        )];
        const fallbackParts = [...new Set(items.map(i => (isHeart(i) ? "心超" : "腹超")))];
        const minSigntime = items
          .map(i => new Date(String(i.signtime || "").replace(" ", "T")).getTime())
          .filter(v => !Number.isNaN(v))
          .sort((a, b) => a - b)[0];
        const wait = minSigntime ? `${Math.max(0, (Date.now() - minSigntime) / (1000 * 60 * 60)).toFixed(1)}h` : "-";

        merged.push({
          caseKey: getCaseKey(items[0]),
          queueNoText: queueNos.join("、"),
          ownerPetText: `${items[0]?.pat_name || "-"} / ${items[0]?.name || "-"}`,
          titleText: `${queueNos.join("、")} ${items[0]?.pat_name || "-"} / ${items[0]?.name || "-"}`,
          projectText: (projects.length > 0 ? projects : fallbackParts).join("、"),
          waitText: wait,
          hasPassByRh: items.some(i => String(i.rh_status) === "2" || String(i.rh_status) === "3"),
          hasExplicitStatus: [...new Set(items.map(getCaseKey))].some((k) => hasExplicitStatusForBase(k)),
          hasMixedLanes: items.some(isHeart) && items.some(i => !isHeart(i)),
          allCaseKeys: [...new Set(items.map(getCaseKey))],
          callPayload: {
            xh: items[0]?.xh || "",
            serial_no: items[0]?.serial_no || "",
            patient_id: items[0]?.patient_id || "",
            callingroom: items[0]?.callingroom || document.getElementById("room").value.trim() || "15",
            name: items[0]?.name || "",
            pat_name: items[0]?.pat_name || "",
            kind: items[0]?.kind || items[0]?.kind_group || "",
            rh_status: items[0]?.rh_status || "",
            queue_bucket: items[0]?.queue_bucket || ""
          }
        });
      }
      return merged;
    }

    function isCardHold(cardRow) {
      const baseState = caseStateMap.get(cardRow.caseKey) || {};
      if (String(baseState.status || "").trim() === "hold") return true;
      const allKeys = Array.isArray(cardRow.allCaseKeys) ? cardRow.allCaseKeys : [];
      for (const baseKey of allKeys) {
        if (String((caseStateMap.get(baseKey) || {}).status || "").trim() === "hold") return true;
        if (String((caseStateMap.get(getLaneCaseKey(baseKey, "heart")) || {}).status || "").trim() === "hold") return true;
        if (String((caseStateMap.get(getLaneCaseKey(baseKey, "abd")) || {}).status || "").trim() === "hold") return true;
      }
      return false;
    }

    function isCardPass(cardRow) {
      const allKeys = Array.isArray(cardRow.allCaseKeys) ? cardRow.allCaseKeys : [cardRow.caseKey];
      for (const baseKey of allKeys) {
        const baseStatus = normalizeStatusValue((caseStateMap.get(baseKey) || {}).status, "");
        const heartStatus = normalizeStatusValue((caseStateMap.get(getLaneCaseKey(baseKey, "heart")) || {}).status, "");
        const abdStatus = normalizeStatusValue((caseStateMap.get(getLaneCaseKey(baseKey, "abd")) || {}).status, "");
        if (baseStatus === "pass" || heartStatus === "pass" || abdStatus === "pass") return true;
      }
      return false;
    }

    async function refreshLatestRows(date, room, nonce = 0) {
      const file = `../exports/RH_GET99LIST_${date}_room${room}.json`;
      const res = await fetch(`${file}?t=${encodeURIComponent(String(nonce || Date.now()))}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const customRows = await fetchCustomRows(date, room, nonce);
      latestRowsCache = flatten99(json.data || []).concat(customRows);
    }

    function getCardBorderMode(cardRow, firstHeartKey, firstAbdKey) {
      if (cardRow.caseKey && cardRow.caseKey === firstHeartKey) return "first-heart";
      if (cardRow.caseKey && cardRow.caseKey === firstAbdKey) return "first-abd";
      return "default";
    }

    function normalizeKeyword(s) {
      return String(s || "").toLowerCase().replace(/\s+/g, "");
    }

    function isCardMatchedByKeyword(cardRow, keyword) {
      const k = normalizeKeyword(keyword);
      if (!k) return false;
      const hay = normalizeKeyword([
        cardRow.queueNoText,
        cardRow.ownerPetText,
        cardRow.titleText
      ].join(" "));
      if (hay.includes(k)) return true;
      // 纯数字检索：支持直接输入数字命中 Y52/X52/M52 等排队号。
      if (/^\d+$/.test(k)) {
        const queueText = String(cardRow.queueNoText || "");
        const queueNums = queueText
          .split(/[、,\s]+/)
          .map(x => String(x || "").replace(/[^0-9]/g, ""))
          .filter(Boolean);
        if (queueNums.some(n => n.includes(k))) return true;
      }
      return false;
    }

    function focusFirstMatchedCard() {
      if (!quickSearchKeyword) return;
      const first = document.querySelector("#board .card.search-hit");
      first?.scrollIntoView({ block: "center", behavior: "smooth" });
    }

    const STATUS_LONG_PRESS_MS = 520;
    /** 按下后延迟这么久才显示圆环；短于此时长的点击不进入长按改状态 */
    const LONG_PRESS_ARM_MS = 200;
    const LONGPRESS_RING_R = 18;

    function ensureLongPressRing(card) {
      let wrap = card.querySelector(".longpress-ring-wrap");
      if (!wrap) {
        wrap = document.createElement("div");
        wrap.className = "longpress-ring-wrap";
        wrap.innerHTML =
          '<svg class="longpress-ring-svg" viewBox="0 0 44 44" aria-hidden="true">' +
          '<circle class="longpress-ring-bg" cx="22" cy="22" r="' +
          LONGPRESS_RING_R +
          '" fill="none" stroke="rgba(45,108,223,0.2)" stroke-width="3"/>' +
          '<circle class="longpress-ring-progress" cx="22" cy="22" r="' +
          LONGPRESS_RING_R +
          '" fill="none" stroke="#2d6cdf" stroke-width="3" stroke-linecap="round" transform="rotate(-90 22 22)"/>' +
          "</svg>";
        card.appendChild(wrap);
      }
      return wrap;
    }

    function renderCards(rows) {
      const board = document.getElementById("board");
      const mergedRows = mergeRowsByCase(rows);
      const soonHeartList = buildSoonCaseKeyList(rows, "heart", displaySettings.heart_soon_limit);
      const soonAbdList = buildSoonCaseKeyList(rows, "abd", displaySettings.abd_soon_limit);
      const firstHeartKey = soonHeartList[0] || "";
      const firstAbdKey = soonAbdList[0] || "";
      const columns = 6;
      const baseRows = 5;
      const minSlots = columns * baseRows;
      const slotCount = Math.max(minSlots, mergedRows.length);
      const totalRows = Math.ceil(slotCount / columns);
      const cards = [];
      for (let i = 0; i < slotCount; i++) {
        const r = mergedRows[i];
        const col = (i % columns) + 1;
        const row = totalRows - Math.floor(i / columns);
        const pos = `style="grid-column:${col};grid-row:${row};"`;
        if (!r) {
          cards.push(`<div class="card empty" data-slot-index="${i + 1}" ${pos}></div>`);
          continue;
        }
        const st = caseStateMap.get(r.caseKey) || {};
        const shaved = !!st.is_shaved;
        const borderMode = getCardBorderMode(r, firstHeartKey, firstAbdKey);
        const borderClass = borderMode === "first-heart"
            ? "status-border-first-heart"
            : borderMode === "first-abd"
              ? "status-border-first-abd"
              : "";
        const hitClass = isCardMatchedByKeyword(r, quickSearchKeyword) ? "search-hit" : "";
        const allKeysAttr = r.allCaseKeys.join("||");
        cards.push(`
          <div class="card ${shaved ? "shaved" : ""} ${borderClass} ${hitClass}" data-case-key="${r.caseKey}" data-mixed="${r.hasMixedLanes ? "1" : "0"}" data-all-case-keys="${allKeysAttr}" data-slot-index="${i + 1}" ${pos}>
            ${isCardHold(r) ? '<span class="hold-dot" title="暂离留号"></span>' : ""}
            ${isCardPass(r) ? '<span class="pass-dot" title="叫号未到"></span>' : ""}
            ${shaved ? '<div class="check-mark">√</div>' : ""}
            <div class="line1">${r.titleText}</div>
            <div class="line3">${fullProjectList(r.projectText) || "-"}</div>
            <div class="line4">等待时间：${r.waitText}</div>
            <button class="card-call-btn" data-call='${JSON.stringify(r.callPayload || {})}'>叫号</button>
          </div>
        `);
      }
      board.innerHTML = cards.join("");
      board.querySelectorAll(".card-call-btn").forEach((btn) => {
        btn.addEventListener("pointerdown", (e) => e.stopPropagation());
        btn.addEventListener("pointerup", (e) => e.stopPropagation());
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const payload = JSON.parse(btn.dataset.call || "{}");
          await callNumberViaProxy(payload);
        });
      });
      board.querySelectorAll(".card[data-case-key]").forEach(card => {
        card.addEventListener("dblclick", async (e) => {
          if (e.target.closest(".card-call-btn")) return;
          const key = card.dataset.caseKey;
          if (!key) return;
          const date = getWorkDate();
          const room = document.getElementById("room").value.trim();
          const current = caseStateMap.get(key) || {};
          try {
            await upsertCaseState(date, room, key, { is_shaved: !current.is_shaved });
            card.classList.toggle("shaved", !current.is_shaved);
            const existing = card.querySelector(".check-mark");
            if (!current.is_shaved && !existing) {
              const mark = document.createElement("div");
              mark.className = "check-mark";
              mark.textContent = "√";
              card.appendChild(mark);
            } else if (current.is_shaved && existing) {
              existing.remove();
            }
          } catch (e) {
            document.getElementById("meta").textContent = `更新剃毛失败: ${e.message}`;
          }
        });
        let startX = 0;
        let startY = 0;
        let dragging = false;
        let activePointerId = null;
        let activeCompleteKeys = [];
        let longPressPending = false;
        let longPressArmTimer = null;
        let longPressAnimHandler = null;

        function tearDownLongPressUi() {
          if (longPressArmTimer) {
            clearTimeout(longPressArmTimer);
            longPressArmTimer = null;
          }
          longPressPending = false;
          if (longPressAnimHandler) {
            const prog = card.querySelector(".longpress-ring-progress");
            if (prog) {
              prog.removeEventListener("animationend", longPressAnimHandler);
              prog.classList.remove("is-running");
            }
            longPressAnimHandler = null;
          }
          const w = card.querySelector(".longpress-ring-wrap");
          if (w) w.classList.remove("visible");
          card.classList.remove("longpress-active");
        }

        card.addEventListener("pointerdown", (e) => {
          if (e.target.closest(".card-call-btn")) return;
          startX = e.clientX;
          startY = e.clientY;
          tearDownLongPressUi();
          const keysText = card.dataset.allCaseKeys || card.dataset.caseKey || "";
          activeCompleteKeys = String(keysText).split("||").map(x => x.trim()).filter(Boolean);
          dragging = true;
          activePointerId = e.pointerId;
          try { card.setPointerCapture(e.pointerId); } catch {}
          card.classList.add("dragging");
          longPressPending = true;
          longPressArmTimer = setTimeout(() => {
              longPressArmTimer = null;
              if (!longPressPending) return;
              card.style.setProperty("--lp-dur", `${STATUS_LONG_PRESS_MS}ms`);
              const wrap = ensureLongPressRing(card);
              const prog = wrap.querySelector(".longpress-ring-progress");
              const c = 2 * Math.PI * LONGPRESS_RING_R;
              prog.style.setProperty("--lp-circ", String(c));
              wrap.classList.add("visible");
              card.classList.add("longpress-active");
              prog.classList.remove("is-running");
              void prog.getBoundingClientRect();
              longPressAnimHandler = (ev) => {
                if (ev.target !== prog || ev.animationName !== "longpress-ring-fill") return;
                prog.removeEventListener("animationend", longPressAnimHandler);
                longPressAnimHandler = null;
                if (!longPressPending) return;
                longPressPending = false;
                wrap.classList.remove("visible");
                card.classList.remove("longpress-active");
                prog.classList.remove("is-running");
                const pid = activePointerId;
                dragging = false;
                activePointerId = null;
                try {
                  if (pid != null) card.releasePointerCapture(pid);
                } catch {}
                card.classList.remove("dragging");
                (async () => {
                  try {
                    const status = await chooseStatusForCard(card);
                    if (!status) return;
                    const date = getWorkDate();
                    const room = document.getElementById("room").value.trim();
                    const baseKeys = activeCompleteKeys.length ? activeCompleteKeys : [card.dataset.caseKey || ""];
                    await applyStatusByLongPress(date, room, baseKeys, status);
                    await silentSyncFromCaseStates();
                  } catch (err) {
                    document.getElementById("meta").textContent = `状态更新失败: ${err.message}`;
                  }
                })();
              };
              prog.addEventListener("animationend", longPressAnimHandler);
              prog.classList.add("is-running");
            }, LONG_PRESS_ARM_MS);
        });
        card.addEventListener("pointermove", (e) => {
          if (!dragging || activePointerId !== e.pointerId || !longPressPending) return;
          const dx = Math.abs(e.clientX - startX);
          const dy = Math.abs(e.clientY - startY);
          if (Math.sqrt(dx * dx + dy * dy) >= 35) tearDownLongPressUi();
        });
        card.addEventListener("pointerup", async (e) => {
          if (activePointerId !== null && e.pointerId !== activePointerId) return;
          if (!dragging) return;
          if (longPressPending) tearDownLongPressUi();
          dragging = false;
          activePointerId = null;
          try { card.releasePointerCapture(e.pointerId); } catch {}
          card.classList.remove("dragging");
          const dx = Math.abs(e.clientX - startX);
          const dy = Math.abs(e.clientY - startY);
          if (Math.sqrt(dx * dx + dy * dy) < 35) return;
          const key = card.dataset.caseKey;
          if (!key) return;
          const date = getWorkDate();
          const room = document.getElementById("room").value.trim();
          const now = new Date().toLocaleString("sv-SE").replace("T", " ");
          try {
            let caseKeys = activeCompleteKeys.length > 0 ? activeCompleteKeys : [key];
            if (card.dataset.mixed === "1") {
              const lane = await chooseLaneForDelete();
              if (!lane) return;
              // 无论删除哪个子项目，都把该病例的开始检查时间写到基础 case_key，便于 dashboard 同步显示。
              await upsertCaseState(date, room, key, { start_check_time: now });
              caseKeys = [getLaneCaseKey(key, lane)];
            }
            for (const k of caseKeys) {
              await upsertCaseState(date, room, k, { status: "completed", start_check_time: now });
            }
            // 标记完成后立即重绘，让后续卡片自动补位前移。
            await safeLoad();
          } catch (err) {
            document.getElementById("meta").textContent = `完成更新失败: ${err.message}`;
          }
        });
        card.addEventListener("pointercancel", () => {
          tearDownLongPressUi();
          dragging = false;
          activePointerId = null;
          card.classList.remove("dragging");
        });
      });
      focusFirstMatchedCard();
    }

    function scrollToQueueBottom() {
      // 当前排版从左下角开始，默认滚到底部更方便直接操作第一批号。
      window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "auto" });
    }
    async function chooseLaneForDelete() {
      const mask = document.getElementById("laneMask");
      const btnHeart = document.getElementById("deleteHeartBtn");
      const btnAbd = document.getElementById("deleteAbdBtn");
      const btnCancel = document.getElementById("deleteLaneCancelBtn");
      if (!mask || !btnHeart || !btnAbd || !btnCancel) return null;
      mask.style.display = "flex";
      return await new Promise((resolve) => {
        const cleanup = () => {
          mask.style.display = "none";
          btnHeart.removeEventListener("click", onHeart);
          btnAbd.removeEventListener("click", onAbd);
          btnCancel.removeEventListener("click", onCancel);
          mask.removeEventListener("click", onMask);
        };
        const onHeart = () => { cleanup(); resolve("heart"); };
        const onAbd = () => { cleanup(); resolve("abd"); };
        const onCancel = () => { cleanup(); resolve(null); };
        const onMask = (evt) => {
          if (evt.target !== mask) return;
          cleanup();
          resolve(null);
        };
        btnHeart.addEventListener("click", onHeart);
        btnAbd.addEventListener("click", onAbd);
        btnCancel.addEventListener("click", onCancel);
        mask.addEventListener("click", onMask);
      });
    }

    async function chooseStatusForCard(anchorCard) {
      const mask = document.getElementById("statusMask");
      const modal = mask?.querySelector(".status-modal");
      const btnNocall = document.getElementById("setStatusNocallBtn");
      const btnHold = document.getElementById("setStatusHoldBtn");
      const btnPass = document.getElementById("setStatusPassBtn");
      if (!mask || !modal || !btnNocall || !btnHold || !btnPass) return null;
      mask.classList.add("open");
      const cardRect = anchorCard?.getBoundingClientRect?.();
      const cardWidth = cardRect ? Math.max(96, Math.floor(cardRect.width - 8)) : 120;
      const modalWidth = Math.min(160, cardWidth);
      const left = cardRect
        ? Math.round(cardRect.left + Math.max(2, (cardRect.width - modalWidth) / 2))
        : Math.max(10, Math.round((window.innerWidth - modalWidth) / 2));
      const top = cardRect
        ? Math.round(cardRect.top + 4)
        : 20;
      modal.style.width = `${modalWidth}px`;
      modal.style.left = `${Math.round(left)}px`;
      modal.style.top = `${Math.round(top)}px`;
      return await new Promise((resolve) => {
        const cleanup = () => {
          mask.classList.remove("open");
          btnNocall.removeEventListener("click", onNocall);
          btnHold.removeEventListener("click", onHold);
          btnPass.removeEventListener("click", onPass);
          mask.removeEventListener("click", onMask);
        };
        const onNocall = () => { cleanup(); resolve("nocall"); };
        const onHold = () => { cleanup(); resolve("hold"); };
        const onPass = () => { cleanup(); resolve("pass"); };
        const onMask = (evt) => {
          if (evt.target !== mask) return;
          cleanup();
          resolve(null);
        };
        btnNocall.addEventListener("click", onNocall);
        btnHold.addEventListener("click", onHold);
        btnPass.addEventListener("click", onPass);
        mask.addEventListener("click", onMask);
      });
    }

    function expandCaseKeys(baseCaseKeys) {
      const out = [];
      for (const base of baseCaseKeys) {
        out.push(base, getLaneCaseKey(base, "heart"), getLaneCaseKey(base, "abd"));
      }
      return [...new Set(out.filter(Boolean))];
    }

    async function applyStatusByLongPress(date, room, baseCaseKeys, nextStatus) {
      const expandedKeys = expandCaseKeys(baseCaseKeys);
      const statusValue = nextStatus;
      const now = new Date().toLocaleString("sv-SE").replace("T", " ");
      for (const key of expandedKeys) {
        await upsertCaseState(date, room, key, {
          status: statusValue,
          start_check_time: nextStatus === "completed" ? now : (caseStateMap.get(key)?.start_check_time || "")
        });
      }
    }

    async function fetchCustomRows(date, room, nonce = 0) {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      try {
        const resp = await fetch(
          `${proxyBase}/custom_rows?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}&t=${encodeURIComponent(String(nonce || Date.now()))}`,
          { cache: "no-store" }
        );
        const data = await resp.json();
        if (!resp.ok || !data.ok || !Array.isArray(data.rows)) return [];
        return data.rows;
      } catch {
        return [];
      }
    }

    function clampSoonLimit(v, fallbackValue) {
      const n = Number(v);
      if (!Number.isFinite(n)) return fallbackValue;
      return Math.max(0, Math.min(30, Math.floor(n)));
    }

    function applySoonLimitInputs() {
      const abdInput = document.getElementById("abdSoonLimitInput");
      const heartInput = document.getElementById("heartSoonLimitInput");
      if (abdInput) abdInput.value = String(clampSoonLimit(displaySettings.abd_soon_limit, 3));
      if (heartInput) heartInput.value = String(clampSoonLimit(displaySettings.heart_soon_limit, 2));
    }

    async function fetchDisplaySettings(date, room) {
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      try {
        const resp = await fetch(`${proxyBase}/display_settings?date=${encodeURIComponent(date)}&room=${encodeURIComponent(room)}`);
        const data = await resp.json();
        if (!resp.ok || !data.ok) return;
        displaySettings = {
          abd_soon_limit: clampSoonLimit(data.abd_soon_limit, 3),
          heart_soon_limit: clampSoonLimit(data.heart_soon_limit, 2),
        };
        applySoonLimitInputs();
      } catch {}
    }

    async function saveDisplaySettings(date, room) {
      const abd = clampSoonLimit(document.getElementById("abdSoonLimitInput")?.value, 3);
      const heart = clampSoonLimit(document.getElementById("heartSoonLimitInput")?.value, 2);
      const proxyBase = `${window.location.protocol}//${window.location.hostname}:18080`;
      const resp = await fetch(`${proxyBase}/display_settings`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date, room, abd_soon_limit: abd, heart_soon_limit: heart })
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      displaySettings = {
        abd_soon_limit: clampSoonLimit(data.abd_soon_limit, abd),
        heart_soon_limit: clampSoonLimit(data.heart_soon_limit, heart),
      };
      applySoonLimitInputs();
      notifyDisplayScreensStateSync();
    }

    async function loadData() {
      const date = getWorkDate();
      const room = document.getElementById("room").value.trim();
      const nonce = Date.now();
      await refreshLatestRows(date, room, nonce);
      await fetchDisplaySettings(date, room);
      await fetchCaseStates(date, room, nonce);
      const rows = buildPendingRows(latestRowsCache);
      renderCards(rows);
      lastRenderSignature = buildRenderSignature(rows);
      scrollToQueueBottom();
      document.getElementById("meta").textContent = `刷新: ${new Date().toLocaleString("zh-CN")}`;
    }

    async function silentSyncFromCaseStates() {
      if (silentSyncBusy) {
        silentSyncPending = true;
        return;
      }
      silentSyncBusy = true;
      const date = getWorkDate();
      const room = document.getElementById("room").value.trim();
      try {
        const nonce = Date.now();
        await refreshLatestRows(date, room, nonce);
        await fetchDisplaySettings(date, room);
        await fetchCaseStates(date, room, nonce);
        if (!latestRowsCache.length) return;
        const rows = buildPendingRows(latestRowsCache);
        const nextSig = buildRenderSignature(rows);
        if (nextSig !== lastRenderSignature) {
          renderCards(rows);
          lastRenderSignature = nextSig;
        }
      } finally {
        silentSyncBusy = false;
        if (silentSyncPending) {
          silentSyncPending = false;
          setTimeout(() => { silentSyncFromCaseStates().catch(() => {}); }, 0);
        }
      }
    }

    async function safeLoad() {
      try { await loadData(); } catch (e) { document.getElementById("meta").textContent = `加载失败: ${e.message}`; }
    }

    function applyExternalWorkDate(d) {
      if (!isIsoDate(d)) return;
      const el = document.getElementById("workDate");
      if (!el || el.value.trim() === d) return;
      el.value = d;
      syncDateQueryToUrl(d);
      safeLoad();
    }
    document.getElementById("room").value = params.get("room")
      || (typeof window.QUEUE_DEMO_DEFAULT_ROOM === "string" && String(window.QUEUE_DEMO_DEFAULT_ROOM).trim())
      || "15";
    const workDateEl = document.getElementById("workDate");
    const opDateSeed = readSharedWorkDateSeed();
    persistSharedWorkDate(opDateSeed);
    workDateEl.value = opDateSeed;
    syncDateQueryToUrl(opDateSeed);
    workDateEl.addEventListener("change", () => {
      const d = workDateEl.value.trim();
      if (isIsoDate(d)) persistSharedWorkDate(d);
      if (d) syncDateQueryToUrl(d);
      safeLoad();
    });
    document.getElementById("room").addEventListener("change", () => { safeLoad(); });
    window.addEventListener("storage", (e) => {
      if (e.key === QUEUE_SHARED_WORK_DATE_KEY && e.newValue && isIsoDate(e.newValue)) {
        applyExternalWorkDate(e.newValue);
        return;
      }
      if (e.key !== FORCE_REFRESH_KEY) return;
      safeLoad();
    });
    if (workDateBroadcast) {
      workDateBroadcast.onmessage = (ev) => {
        const d = ev.data && ev.data.date;
        if (isIsoDate(d)) applyExternalWorkDate(d);
      };
    }
    if (stateSyncBroadcast) {
      stateSyncBroadcast.onmessage = (ev) => {
        const from = ev.data && ev.data.from;
        if (from === STATE_SYNC_TAB_ID) return;
        if (stateSyncPeerTimer) return;
        stateSyncPeerTimer = setTimeout(() => {
          stateSyncPeerTimer = null;
          silentSyncFromCaseStates().catch(() => {});
        }, 60);
      };
    }
    document.getElementById("quickSearchInput").addEventListener("input", () => {
      quickSearchKeyword = document.getElementById("quickSearchInput").value.trim();
      const rows = buildPendingRows(latestRowsCache);
      renderCards(rows);
    });
    document.getElementById("saveSoonLimitBtn").addEventListener("click", async () => {
      const date = getWorkDate();
      const room = document.getElementById("room").value.trim();
      try {
        await saveDisplaySettings(date, room);
        document.getElementById("meta").textContent = `即将叫号阈值已保存：腹超${displaySettings.abd_soon_limit}，心超${displaySettings.heart_soon_limit}`;
      } catch (e) {
        document.getElementById("meta").textContent = `阈值保存失败: ${e.message}`;
      }
    });
    if (ENABLE_LIVE_POLLING) {
      setInterval(safeLoad, 3000);
      setInterval(() => { silentSyncFromCaseStates().catch(() => {}); }, 1000);
    }
    safeLoad();
  </script>
</body>
</html>
